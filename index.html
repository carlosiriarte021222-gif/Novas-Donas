<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA PRO - Sistema Profesional</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { --primary:#ffce00; --bg:#000; --card:#1a1a1a; --text:#fff; }

body { background:var(--bg); color:var(--text); margin:0; }

.sidebar { width:260px; height:100vh; background:#111; position:fixed; padding:25px; }
.nav-link { color:#fff; padding:12px; border-radius:12px; cursor:pointer; user-select:none; }
.nav-link.active, .nav-link:hover { background:var(--primary); color:#000; }

.main { margin-left:260px; padding:30px; }

.section { display:none; }
.section.active { display:block; }

.card-nova { background:var(--card); padding:20px; border-radius:15px; }

.btn-nova { background:var(--primary); font-weight:bold; border:none; }

@media(max-width:768px){
.sidebar{position:relative;width:100%;height:auto;}
.main{margin-left:0;}
}
</style>
</head>

<body>

<div class="sidebar">
<h3>NOVA PRO</h3>

<div class="nav-link active" onclick="ver('dash', this)">Dashboard</div>
<div class="nav-link" onclick="ver('ventas', this)">Ventas</div>
<div class="nav-link" onclick="ver('gastos', this)">Gastos</div>
<div class="nav-link" onclick="ver('inventario', this)">Inventario</div>
<div class="nav-link" onclick="ver('mermas', this)">Mermas</div>

<hr>
<div onclick="cambiarUser()" id="user-tag">Admin</div>
</div>

<div class="main">

<div id="dash" class="section active">
<h2>Dashboard</h2>

<div class="row">
<div class="col-md-4"><div class="card-nova"><h5>Ingresos</h5><h3 id="ing">$0</h3></div></div>
<div class="col-md-4"><div class="card-nova"><h5>Gastos</h5><h3 id="gas">$0</h3></div></div>
<div class="col-md-4"><div class="card-nova"><h5>Utilidad</h5><h3 id="util">$0</h3></div></div>
</div>

<div class="mt-4">
<div class="progress">
<div id="barra" class="progress-bar bg-warning" style="width:0%">0%</div>
</div>
<p id="msg"></p>
</div>

<canvas id="chart"></canvas>
</div>

<div id="ventas" class="section">
<h3>Ventas</h3>
<button onclick="pop('venta')" class="btn btn-nova mb-2">Nueva</button>
<table class="table table-dark">
<tbody id="tab-ventas"></tbody>
</table>
</div>

<div id="gastos" class="section">
<h3>Gastos</h3>
<button onclick="pop('gasto')" class="btn btn-nova mb-2">Nuevo</button>
<table class="table table-dark">
<tbody id="tab-gastos"></tbody>
</table>
</div>

<div id="inventario" class="section">
<h3>Inventario</h3>
<button onclick="pop('insumo')" class="btn btn-nova mb-2">Nuevo</button>
<div id="tab-insumos" class="row"></div>
</div>

<div id="mermas" class="section">
<h3>Mermas</h3>
<button onclick="pop('merma')" class="btn btn-nova mb-2">Nuevo</button>
<table class="table table-dark">
<tbody id="tab-mermas"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalNova">
<div class="modal-dialog">
<div class="modal-content bg-dark text-white p-3">
<div id="m-body"></div>
<button onclick="guardar()" class="btn btn-nova mt-3" data-bs-dismiss="modal">Guardar</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let db = JSON.parse(localStorage.getItem('NOVA_DB')) || {user:"Admin",ventas:[],gastos:[],insumos:[],mermas:[]};
let tipo="";
let modal=new bootstrap.Modal(document.getElementById('modalNova'));
let chart=null;
let guardando=false;

// navegación
function ver(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
render();
}

// usuario
function cambiarUser(){
let n=prompt("Nombre");
if(!n || n.trim()==="") return;
db.user=n.trim();
save();
}

// modal
function pop(t){
tipo=t;
let b=document.getElementById('m-body');

if(t==="venta"){
b.innerHTML=`<input id="f1" class="form-control mb-2" placeholder="Cliente">
<input id="f2" class="form-control mb-2" type="number" placeholder="Monto">
<select id="f3" class="form-control"><option>Pagado</option><option>Pendiente</option></select>`;
}

if(t==="gasto"){
b.innerHTML=`<input id="f1" class="form-control mb-2" placeholder="Concepto">
<input id="f2" class="form-control" type="number" placeholder="Monto">`;
}

if(t==="insumo"){
b.innerHTML=`<input id="f1" class="form-control mb-2" placeholder="Insumo">
<input id="f2" class="form-control mb-2" type="number" placeholder="Cantidad">
<select id="f3" class="form-control"><option>Kg</option><option>Litros</option></select>`;
}

if(t==="merma"){
b.innerHTML=`<input id="f1" class="form-control mb-2" type="number" placeholder="Cantidad">
<input id="f2" class="form-control" type="number" placeholder="Pérdida">`;
}

modal.show();
}

// guardar
function guardar(){
if(guardando) return;
guardando=true;

let d1=document.getElementById('f1').value;
let d2=parseFloat(document.getElementById('f2').value);
let d3=document.getElementById('f3')?.value || "";

if(!d1 || isNaN(d2) || d2<=0){
guardando=false;
return alert("Datos inválidos");
}

db[tipo+"s"].push({id:Date.now(),user:db.user,d1,d2,d3});
save();

setTimeout(()=>guardando=false,300);
}

// borrar
function borrar(t,id){
if(!confirm("¿Seguro que deseas eliminar?")) return;
db[t]=db[t].filter(x=>x.id!==id);
save();
}

// guardar local
function save(){
localStorage.setItem('NOVA_DB',JSON.stringify(db));
render();
}

// formato moneda
function format(n){
return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(n);
}

// render principal
function render(){

document.getElementById('user-tag').innerText=db.user;

let vT=0,gT=0,mT=0;

// ventas
let tv=document.getElementById('tab-ventas'); tv.innerHTML="";
db.ventas.forEach(x=>{
vT+=x.d2;
tv.innerHTML+=`<tr><td>${x.d1}</td><td>${format(x.d2)}</td><td>${x.d3}</td><td><button class="btn btn-sm btn-danger" onclick="borrar('ventas',${x.id})">X</button></td></tr>`;
});

// gastos
let tg=document.getElementById('tab-gastos'); tg.innerHTML="";
db.gastos.forEach(x=>{
gT+=x.d2;
tg.innerHTML+=`<tr><td>${x.d1}</td><td>${format(x.d2)}</td><td><button class="btn btn-sm btn-danger" onclick="borrar('gastos',${x.id})">X</button></td></tr>`;
});

// mermas
let tm=document.getElementById('tab-mermas'); tm.innerHTML="";
db.mermas.forEach(x=>{
mT+=x.d2;
tm.innerHTML+=`<tr><td>${x.d1}</td><td>${format(x.d2)}</td><td><button class="btn btn-sm btn-danger" onclick="borrar('mermas',${x.id})">X</button></td></tr>`;
});

// inventario
let ti=document.getElementById('tab-insumos'); ti.innerHTML="";
db.insumos.forEach(x=>{
ti.innerHTML+=`<div class="col-md-3"><div class="card-nova text-center">
<b>${x.d1}</b><br>${x.d2} ${x.d3}<br>
<button class="btn btn-sm btn-danger mt-2" onclick="borrar('insumos',${x.id})">Eliminar</button>
</div></div>`;
});

// dashboard
document.getElementById('ing').innerText=format(vT);
document.getElementById('gas').innerText=format(gT+mT);
document.getElementById('util').innerText=format(vT-(gT+mT));

// punto equilibrio
let total=gT+mT;
let porc= total>0 ? (vT/total)*100 : 0;
porc=Math.min(porc,100);

document.getElementById('barra').style.width=porc+"%";
document.getElementById('barra').innerText=Math.round(porc)+"%";
document.getElementById('msg').innerText=porc>=100?"Ganando dinero":"Aún no cubres costos";

// grafica
let ctx=document.getElementById('chart');
if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'doughnut',
data:{
labels:["Ventas","Gastos"],
datasets:[{data:[vT,total]}]
}
});
}

render();

</script>

</body>
</html>
