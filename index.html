<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Pro - ERP Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .module-section { display: none; }
        .module-section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; }
        .input-nova { background: #f1f5f9; border: 1.5px solid #e2e8f0; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; outline: none; }
        .timestamp { font-size: 9px; font-weight: 800; color: #94a3b8; background: #f1f5f9; padding: 2px 8px; border-radius: 99px; }
        .cloud-status { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 99px; transition: all 0.3s; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div onclick="showModule('main-menu')" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-9 h-9 bg-rose-600 rounded-lg flex items-center justify-center shadow-lg"><span class="text-white font-black text-xl">N</span></div>
            <h1 class="text-lg font-black tracking-tighter uppercase">Nova CTG</h1>
        </div>
        <div id="sync-indicator" class="cloud-status bg-slate-100 text-slate-400">Conectando...</div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">

        <div id="main-menu" class="module-section active">
            
            <div class="glass-card bg-slate-900 text-white mb-6 shadow-2xl">
                <div class="grid grid-cols-2 gap-4 mb-6 border-b border-slate-800 pb-4">
                    <div><p class="text-[9px] font-black text-rose-500 uppercase">Utilidad Neta</p><h2 id="bal-total" class="text-3xl font-black">$ 0</h2></div>
                    <div class="text-right"><p class="text-[9px] font-black text-slate-500 uppercase">Stock Real</p><h2 id="nav-stock" class="text-3xl font-black">0</h2></div>
                </div>
                <div class="grid grid-cols-2 gap-2 text-[10px] font-black uppercase text-slate-400">
                    <div class="flex justify-between"><span>Ventas Brutas:</span><span id="bal-sales" class="text-emerald-400">$ 0</span></div>
                    <div class="flex justify-between"><span>Cajas Salientes:</span><span id="total-boxes-out" class="text-white">0</span></div>
                </div>
                <button onclick="closeDay()" class="w-full mt-6 bg-rose-600 py-3 rounded-xl font-black uppercase text-xs shadow-lg shadow-rose-900/20">Cerrar Jornada</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <button onclick="showModule('module-inventory')" class="glass-card flex flex-col items-center py-6 border hover:bg-slate-50"><i class="fas fa-box text-blue-500 mb-2"></i><span class="text-[9px] font-black uppercase">Inventario</span></button>
                <button onclick="showModule('module-routes')" class="glass-card flex flex-col items-center py-6 border hover:bg-slate-50"><i class="fas fa-truck text-amber-500 mb-2"></i><span class="text-[9px] font-black uppercase">Rutas</span></button>
                <button onclick="showModule('module-finance')" class="glass-card flex flex-col items-center py-6 border hover:bg-slate-50"><i class="fas fa-wallet text-emerald-500 mb-2"></i><span class="text-[9px] font-black uppercase">Pagos/Gastos</span></button>
                <button onclick="showModule('module-raw-material')" class="glass-card flex flex-col items-center py-6 border hover:bg-slate-50"><i class="fas fa-leaf text-purple-500 mb-2"></i><span class="text-[9px] font-black uppercase">Insumos</span></button>
                <button onclick="showModule('module-losses')" class="glass-card flex flex-col items-center py-6 border hover:bg-slate-50"><i class="fas fa-trash-alt text-rose-500 mb-2"></i><span class="text-[9px] font-black uppercase">Pérdidas</span></button>
                <button onclick="showModule('module-history')" class="glass-card flex flex-col items-center py-6 border-slate-900 border-2"><i class="fas fa-history text-slate-900 mb-2"></i><span class="text-[9px] font-black uppercase">Historial</span></button>
            </div>
        </div>

        <div id="module-inventory" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400 uppercase"><i class="fas fa-arrow-left mr-1"></i> Volver</button>
            <div class="glass-card text-center py-10">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Stock en Fábrica</p>
                <div id="display-stock" class="text-8xl font-black text-slate-900 mb-8">0</div>
                <div class="flex flex-col gap-3 max-w-xs mx-auto">
                    <input type="number" id="input-add-stock" class="input-nova text-center text-xl" placeholder="Cajas">
                    <button onclick="addStock()" class="bg-rose-600 text-white py-4 rounded-xl font-black uppercase">Sumar al Stock</button>
                </div>
            </div>
        </div>

        <div id="module-routes" class="module-section">
            <div class="flex justify-between items-center mb-6"><button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase">Volver</button><button onclick="addEntry('routes')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black">+ Nueva Ruta</button></div>
            <div id="routes-container" class="space-y-4"></div>
        </div>

        <div id="module-losses" class="module-section">
            <div class="flex justify-between items-center mb-6"><button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase">Volver</button><button onclick="addEntry('losses')" class="bg-rose-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">+ Pérdida</button></div>
            <div id="losses-container" class="space-y-4"></div>
        </div>

        <div id="module-raw-material" class="module-section">
            <div class="flex justify-between items-center mb-6"><button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase">Volver</button><button onclick="addEntry('raw')" class="bg-purple-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">+ Insumo</button></div>
            <div id="raw-container" class="space-y-4"></div>
        </div>

        <div id="module-finance" class="module-section">
            <div class="flex justify-between items-center mb-6"><button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase">Volver</button><button onclick="addEntry('expenses')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">+ Pago</button></div>
            <div id="expenses-container" class="space-y-4"></div>
        </div>

        <div id="module-history" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400 uppercase">Volver</button>
            <div id="history-container" class="space-y-3"></div>
        </div>

    </div>

    <script>
        // CONFIGURACIÓN NUBE
        const SB_URL = "https://vkhiayprbreeokkxkjmg.supabase.co";
        const SB_KEY = "sb_publishable_yE8PXM9tFAdnKTYAILiSbQ__sM7e6Y3a9X6c9E0e";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let db = { initial_stock: 0, price: 48000, cost: 20000, routes: [], expenses: [], raw: [], losses: [], history: [] };
        const MASTER_CODE = "26822231";

        async function loadCloud() {
            updateStatus("Sincronizando...", "bg-blue-100 text-blue-600");
            const { data } = await _supabase.from('sistema_nova').select('datos').eq('id', 1).single();
            if (data?.datos) {
                db = { ...db, ...data.datos };
                renderAll();
                updateStatus("En Línea", "bg-emerald-100 text-emerald-600");
            }
        }

        async function saveCloud() {
            updateStatus("Guardando...", "bg-amber-100 text-amber-600");
            await _supabase.from('sistema_nova').update({ datos: db }).eq('id', 1);
            updateStatus("En Línea", "bg-emerald-100 text-emerald-600");
        }

        function updateStatus(txt, cls) {
            const el = document.getElementById('sync-indicator');
            el.innerText = txt; el.className = `cloud-status ${cls}`;
        }

        function calculate() {
            let tc = 0, tl = 0, tr = 0, te = 0;
            db.routes.forEach(r => tc += parseInt(r.qty) || 0);
            db.losses.forEach(l => tl += parseInt(l.pay) || 0);
            db.raw.forEach(rm => tr += parseInt(rm.pay) || 0);
            db.expenses.forEach(e => te += parseInt(e.pay) || 0);

            const ventas = tc * db.price;
            const util = ventas - (tc * db.cost) - tl - tr - te;

            document.getElementById('bal-sales').innerText = `$ ${ventas.toLocaleString()}`;
            document.getElementById('bal-total').innerText = `$ ${util.toLocaleString()}`;
            document.getElementById('total-boxes-out').innerText = tc;
            document.getElementById('nav-stock').innerText = db.initial_stock - tc;
            document.getElementById('display-stock').innerText = db.initial_stock - tc;
        }

        function renderAll() {
            ['routes', 'losses', 'raw', 'expenses'].forEach(type => {
                const container = document.getElementById(`${type}-container`);
                container.innerHTML = '';
                db[type].forEach((item, idx) => {
                    const div = document.createElement('div');
                    div.className = "glass-card space-y-2";
                    if(type === 'routes') {
                        div.innerHTML = `
                            <div class="flex justify-between"><input onchange="updateItem('${type}',${idx},'name',this.value)" value="${item.name}" class="font-bold outline-none flex-1" placeholder="Tienda"><span class="timestamp">${item.time}</span></div>
                            <div class="flex gap-2"><input type="number" onchange="updateItem('${type}',${idx},'qty',this.value)" value="${item.qty}" class="input-nova font-black text-rose-600 flex-1"><button onclick="deleteEntry('${type}',${idx})" class="text-slate-200 px-2"><i class="fas fa-trash"></i></button></div>`;
                    } else {
                        div.innerHTML = `
                            <div class="flex gap-2"><input onchange="updateItem('${type}',${idx},'${type==='raw'?'item':'desc'}',this.value)" value="${item.item || item.desc}" class="input-nova text-xs flex-1" placeholder="Concepto"><input type="number" onchange="updateItem('${type}',${idx},'pay',this.value)" value="${item.pay}" class="input-nova text-xs w-24 font-black" placeholder="$"><button onclick="deleteEntry('${type}',${idx})" class="text-slate-200 px-2"><i class="fas fa-trash"></i></button></div>`;
                    }
                    container.appendChild(div);
                });
            });
            calculate();
        }

        function updateItem(type, idx, key, val) {
            db[type][idx][key] = (key === 'qty' || key === 'pay') ? parseInt(val) || 0 : val;
            calculate(); saveCloud();
        }

        function addEntry(type) {
            const newItem = type === 'routes' ? {name:'', qty:0, time: new Date().toLocaleTimeString()} : {desc:'', item:'', pay:0};
            db[type].push(newItem);
            renderAll(); saveCloud();
        }

        function deleteEntry(type, idx) {
            if(prompt("CÓDIGO SEGURIDAD:") === MASTER_CODE) { db[type].splice(idx,1); renderAll(); saveCloud(); }
        }

        function addStock() {
            const v = parseInt(document.getElementById('input-add-stock').value);
            if(v) { db.initial_stock += v; document.getElementById('input-add-stock').value = ''; renderAll(); saveCloud(); }
        }

        function closeDay() {
            if(confirm("¿Finalizar el día? Esto guardará el cierre en el historial y limpiará las tablas.")) {
                let tc = 0; db.routes.forEach(r => tc += r.qty);
                db.history.unshift({ date: new Date().toLocaleDateString(), util: document.getElementById('bal-total').innerText, boxes: tc });
                db.initial_stock -= tc;
                db.routes = []; db.expenses = []; db.raw = []; db.losses = [];
                renderAll(); saveCloud();
            }
        }

        function renderHistory() {
            const c = document.getElementById('history-container');
            c.innerHTML = db.history.map(h => `
                <div class="glass-card flex justify-between items-center py-4">
                    <div><p class="text-[10px] font-black text-slate-400 uppercase">${h.date}</p><p class="text-sm font-black">${h.boxes} Cajas</p></div>
                    <p class="text-sm font-black text-emerald-600">${h.util}</p>
                </div>
            `).join('') || '<p class="text-center text-slate-400 py-10 font-bold">Sin cierres registrados.</p>';
        }

        function showModule(id) {
            document.querySelectorAll('.module-section').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'module-history') renderHistory();
        }

        window.onload = loadCloud;
    </script>
</body>
</html>
