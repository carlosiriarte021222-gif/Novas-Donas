<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DonutOS PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-900 text-white">

<!-- NAV -->
<nav class="bg-pink-600 p-4 flex gap-2 flex-wrap justify-center">
<button onclick="nav('dash')" class="bg-pink-700 px-4 py-2 rounded">📊 Dashboard</button>
<button onclick="nav('inv')" class="bg-pink-700 px-4 py-2 rounded">📦 Inventario</button>
<button onclick="nav('prod')" class="bg-pink-700 px-4 py-2 rounded">👨‍🍳 Producción</button>
<button onclick="nav('pos')" class="bg-pink-700 px-4 py-2 rounded">💰 Ventas</button>
</nav>

<div class="p-4">

<!-- DASHBOARD -->
<section id="dash">
<h2 class="text-xl mb-4">Dashboard</h2>

<div class="grid grid-cols-2 gap-4">

<div class="bg-slate-800 p-4 rounded">
<p>Ventas</p>
<p id="ventas"></p>
</div>

<div class="bg-slate-800 p-4 rounded">
<p>Quiebre</p>
<p id="quiebre"></p>
</div>

<div class="bg-slate-800 p-4 rounded col-span-2">
<canvas id="chart"></canvas>
</div>

<div class="bg-slate-800 p-4 rounded">
<p>Top Productos</p>
<ul id="top"></ul>
</div>

<div class="bg-slate-800 p-4 rounded">
<p>Alertas</p>
<div id="alertas"></div>
</div>

</div>
</section>

<!-- INVENTARIO -->
<section id="inv" class="hidden">
<h2>Inventario</h2>

<input id="nom" placeholder="Nombre">
<input id="cant" type="number" placeholder="Cantidad kg">
<input id="cost" type="number" placeholder="Costo">
<button onclick="add()">Agregar</button>

<ul id="lista"></ul>
</section>

<!-- PRODUCCIÓN -->
<section id="prod" class="hidden">
<h2>Producción</h2>

<button onclick="producir(1)" class="bg-orange-500 p-2 rounded">🍩 1 Dona</button>
<button onclick="producir(10)" class="bg-orange-600 p-2 rounded">🍩 10 Donas</button>

</section>

<!-- VENTAS -->
<section id="pos" class="hidden">
<h2>Ventas</h2>

<button onclick="venta(5000,'tradicional')" class="bg-pink-500 p-4 rounded">🍩 5000</button>
<button onclick="venta(7000,'especial')" class="bg-purple-500 p-4 rounded">✨ 7000</button>

</section>

</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || {
inventario:[],
ventas:[],
gastos:100000
};

function save(){
localStorage.setItem("db",JSON.stringify(db));
render();
}

function nav(id){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function add(){
let nombre = nom.value.toLowerCase();
let cantidad = cant.value*1000;
let costo = cost.value/cantidad;

db.inventario.push({nombre,cantidad,costo,min:500});
save();
}

function producir(c){
let h = db.inventario.find(i=>i.nombre=="harina");
if(!h) return alert("No hay harina");

let uso = 80*c;

if(h.cantidad<uso) return alert("No alcanza");

h.cantidad -= uso;
save();
}

function venta(v,item){
db.ventas.push({v,item});
save();
}

function render(){

let total = db.ventas.reduce((a,b)=>a+b.v,0);
ventas.innerText = total;

quiebre.innerText = total>=db.gastos?"GANANCIA":"FALTA";

// top
let t={};
db.ventas.forEach(v=>t[v.item]=(t[v.item]||0)+1);

top.innerHTML="";
Object.entries(t).sort((a,b)=>b[1]-a[1]).slice(0,5)
.forEach(x=>{
let li=document.createElement("li");
li.innerText=x[0]+" "+x[1];
top.appendChild(li);
});

// alertas
alertas.innerHTML="";
db.inventario.forEach(i=>{
if(i.cantidad<i.min){
alertas.innerHTML+=i.nombre+" bajo<br>";
}
});

// lista inventario
lista.innerHTML="";
db.inventario.forEach(i=>{
let li=document.createElement("li");
li.innerText=i.nombre+" "+i.cantidad;
lista.appendChild(li);
});

// gráfico
if(window.g) g.destroy();

g = new Chart(chart,{
type:"bar",
data:{
labels:["Ventas","Gastos"],
datasets:[{data:[total,db.gastos]}]
}
});

}

render();

</script>

</body>
</html>
