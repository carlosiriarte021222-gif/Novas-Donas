<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONAS NOVA 🍩</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { --primary:#ffce00; --bg:#000; --card:#1a1a1a; }

body { background:var(--bg); color:#fff; }

.sidebar { width:260px; height:100vh; position:fixed; background:#111; padding:20px; }
.nav-link { cursor:pointer; padding:10px; border-radius:10px; }
.nav-link.active, .nav-link:hover { background:var(--primary); color:#000; }

.main { margin-left:260px; padding:30px; }

.card-nova { background:var(--card); padding:20px; border-radius:15px; margin-bottom:15px; }

.btn-nova { background:var(--primary); font-weight:bold; border:none; }

@media(max-width:768px){
.sidebar{position:relative;width:100%;height:auto;}
.main{margin-left:0;}
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🍩 DONAS NOVA</h2>

<div class="nav-link active" onclick="ver('dash',this)">Dashboard</div>
<div class="nav-link" onclick="ver('ventas',this)">Ventas</div>
<div class="nav-link" onclick="ver('gastos',this)">Gastos</div>

<hr>
<div onclick="cambiarUser()">👤 <span id="user-tag">Admin</span></div>
</div>

<div class="main">

<!-- DASH -->
<div id="dash" class="section active">
<h3>Resumen Diario</h3>

<input type="date" id="filtroFecha" class="form-control mb-3" onchange="render()">

<div class="row">
<div class="col-md-4"><div class="card-nova"><h5>Ventas Día</h5><h3 id="vDia">$0</h3></div></div>
<div class="col-md-4"><div class="card-nova"><h5>Gastos Día</h5><h3 id="gDia">$0</h3></div></div>
<div class="col-md-4"><div class="card-nova"><h5>Ganancia</h5><h3 id="uDia">$0</h3></div></div>
</div>

<canvas id="chart"></canvas>
</div>

<!-- VENTAS -->
<div id="ventas" class="section">
<h3>Ventas</h3>
<button onclick="pop('venta')" class="btn btn-nova mb-2">Nueva</button>

<table class="table table-dark">
<thead>
<tr><th>Cliente</th><th>Ruta</th><th>Monto</th><th>Estado</th><th>Fecha</th><th></th></tr>
</thead>
<tbody id="tab-ventas"></tbody>
</table>
</div>

<!-- GASTOS -->
<div id="gastos" class="section">
<h3>Gastos</h3>
<button onclick="pop('gasto')" class="btn btn-nova mb-2">Nuevo</button>

<table class="table table-dark">
<thead>
<tr><th>Concepto</th><th>Monto</th><th>Fecha</th><th></th></tr>
</thead>
<tbody id="tab-gastos"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalNova">
<div class="modal-dialog">
<div class="modal-content bg-dark p-3">

<div id="m-body"></div>

<button onclick="guardar()" class="btn btn-nova mt-2">Guardar</button>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let db = JSON.parse(localStorage.getItem('NOVA_DB')) || {user:"Admin",ventas:[],gastos:[]};
let tipo="";
let modal=new bootstrap.Modal(document.getElementById('modalNova'));
let chart=null;
let guardando=false;

// navegación
function ver(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
render();
}

// usuario
function cambiarUser(){
let n=prompt("Nombre");
if(!n || n.trim()==="") return;
db.user=n.trim();
save();
}

// modal
function pop(t){
tipo=t;
let b=document.getElementById('m-body');
b.innerHTML="";

// venta
if(t==="venta"){
b.innerHTML=`
<input id="f1" class="form-control mb-2" placeholder="Cliente">
<input id="f4" class="form-control mb-2" placeholder="Ruta">
<input id="f2" type="number" class="form-control mb-2" placeholder="Monto">
<select id="f3" class="form-control mb-2">
<option>Pagado</option>
<option>Pendiente</option>
</select>
<input id="f5" type="date" class="form-control">
`;
}

// gasto
if(t==="gasto"){
b.innerHTML=`
<input id="f1" class="form-control mb-2" placeholder="Concepto">
<input id="f2" type="number" class="form-control mb-2" placeholder="Monto">
<input id="f5" type="date" class="form-control">
`;
}

modal.show();
}

// guardar
function guardar(){
if(guardando) return;
guardando=true;

let d1=document.getElementById('f1').value;
let d2=parseFloat(document.getElementById('f2').value);
let d3=document.getElementById('f3')?.value || "";
let ruta=document.getElementById('f4')?.value || "";
let fecha=document.getElementById('f5')?.value || new Date().toISOString().split('T')[0];

if(!d1 || isNaN(d2) || d2<=0){
guardando=false;
return alert("Datos inválidos");
}

if(tipo==="venta"){
db.ventas.push({id:Date.now(),cliente:d1,ruta,monto:d2,estado:d3,fecha});
}

if(tipo==="gasto"){
db.gastos.push({id:Date.now(),concepto:d1,monto:d2,fecha});
}

save();
modal.hide();

setTimeout(()=>guardando=false,300);
}

// borrar
function borrar(t,id){
if(!confirm("¿Eliminar registro?")) return;
db[t]=db[t].filter(x=>x.id!==id);
save();
}

// guardar local
function save(){
localStorage.setItem('NOVA_DB',JSON.stringify(db));
render();
}

// formato
function format(n){
return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(n);
}

// render
function render(){

document.getElementById('user-tag').innerText=db.user;

let fechaFiltro=document.getElementById('filtroFecha')?.value;

let vDia=0,gDia=0;

// ventas
let tv=document.getElementById('tab-ventas'); tv.innerHTML="";
db.ventas.forEach(x=>{

if(!fechaFiltro || x.fecha===fechaFiltro){
vDia+=x.monto;

tv.innerHTML+=`
<tr>
<td>${x.cliente}</td>
<td>${x.ruta||'-'}</td>
<td>${format(x.monto)}</td>
<td>${x.estado}</td>
<td>${x.fecha}</td>
<td><button class="btn btn-sm btn-danger" onclick="borrar('ventas',${x.id})">X</button></td>
</tr>`;
}

});

// gastos
let tg=document.getElementById('tab-gastos'); tg.innerHTML="";
db.gastos.forEach(x=>{

if(!fechaFiltro || x.fecha===fechaFiltro){
gDia+=x.monto;

tg.innerHTML+=`
<tr>
<td>${x.concepto}</td>
<td>${format(x.monto)}</td>
<td>${x.fecha}</td>
<td><button class="btn btn-sm btn-danger" onclick="borrar('gastos',${x.id})">X</button></td>
</tr>`;
}

});

// totales
document.getElementById('vDia').innerText=format(vDia);
document.getElementById('gDia').innerText=format(gDia);
document.getElementById('uDia').innerText=format(vDia-gDia);

// gráfica
let ctx=document.getElementById('chart');
if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'bar',
data:{
labels:["Ventas","Gastos","Ganancia"],
datasets:[{data:[vDia,gDia,vDia-gDia]}]
}
});
}

render();

</script>

</body>
</html>
