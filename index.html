<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova CTG - Business BYE CARLOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .module-section { display: none; }
        .module-section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .input-nova { background: #f1f5f9; border: 1.5px solid #e2e8f0; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; outline: none; transition: all 0.2s; }
        .input-nova:focus { border-color: #f43f5e; background: white; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div onclick="showModule('main-menu')" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-9 h-9 bg-rose-600 rounded-lg flex items-center justify-center shadow-lg shadow-rose-200">
                <span class="text-white font-black">N</span>
            </div>
            <h1 class="text-lg font-black tracking-tighter">NOVA CTG</h1>
        </div>
        <div class="text-[10px] font-bold text-slate-400">STOCK: <span id="nav-stock" class="text-rose-600">0</span> CAJAS</div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">

        <div id="main-menu" class="module-section active">
            <div class="mb-6">
                <h2 class="text-2xl font-black">Panel de Control</h2>
                <p class="text-slate-400 text-sm">Resumen operativo de hoy</p>
            </div>

            <div class="glass-card bg-slate-900 text-white mb-6">
                <h3 class="text-[10px] font-black uppercase text-slate-500 mb-6 tracking-[3px]">Balance General</h3>
                <div class="space-y-3 mb-6 border-b border-slate-800 pb-6">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-400 font-bold">(+) Ingresos por Ventas</span>
                        <span id="bal-sales" class="text-emerald-400 font-black">$ 0</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-400 font-bold">(-) Pago de Nómina</span>
                        <span id="bal-payroll" class="text-rose-400 font-black">$ 0</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-400 font-bold">(-) Gastos Extra</span>
                        <span id="bal-expenses" class="text-rose-400 font-black">$ 0</span>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-rose-500 uppercase">Utilidad Neta</p>
                        <h2 id="bal-total" class="text-3xl font-black">$ 0</h2>
                    </div>
                    <button onclick="showModule('module-settings')" class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-slate-400"><i class="fas fa-cog"></i></button>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="showModule('module-inventory')" class="glass-card flex flex-col items-center hover:bg-slate-50 transition"><i class="fas fa-box-open text-blue-500 mb-2"></i><span class="text-[10px] font-black uppercase">Inventario</span></button>
                <button onclick="showModule('module-sales')" class="glass-card flex flex-col items-center hover:bg-slate-50 transition"><i class="fas fa-cash-register text-emerald-500 mb-2"></i><span class="text-[10px] font-black uppercase">Ventas</span></button>
                <button onclick="showModule('module-routes')" class="glass-card flex flex-col items-center hover:bg-slate-50 transition"><i class="fas fa-truck text-amber-500 mb-2"></i><span class="text-[10px] font-black uppercase">Rutas</span></button>
                <button onclick="showModule('module-finance')" class="glass-card flex flex-col items-center hover:bg-slate-50 transition"><i class="fas fa-file-invoice-dollar text-rose-500 mb-2"></i><span class="text-[10px] font-black uppercase">Finanzas</span></button>
            </div>
        </div>

        <div id="module-inventory" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400"><i class="fas fa-arrow-left mr-2"></i> VOLVER</button>
            <div class="glass-card text-center py-10">
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-2">Stock Disponible</h3>
                <div id="display-stock" class="text-7xl font-black text-slate-900 mb-8">0</div>
                <div class="flex gap-2 max-w-xs mx-auto">
                    <input type="number" id="input-add-stock" class="input-nova text-center text-xl" placeholder="Cant.">
                    <button onclick="addStock()" class="bg-slate-900 text-white px-6 rounded-xl font-black">CARGAR</button>
                </div>
            </div>
        </div>

        <div id="module-routes" class="module-section">
            <div class="flex justify-between items-center mb-6">
                <button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase"><i class="fas fa-arrow-left"></i> Volver</button>
                <button onclick="addRouteRow()" class="bg-amber-500 text-white px-4 py-2 rounded-xl text-[10px] font-black">AGREGAR TIENDA</button>
            </div>
            <div id="routes-container" class="space-y-4"></div>
        </div>

        <div id="module-sales" class="module-section text-center">
            <button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400 block text-left"><i class="fas fa-arrow-left mr-2"></i> VOLVER</button>
            <div class="glass-card bg-white py-12">
                <div id="sales-count" class="text-9xl font-black text-slate-900 mb-2">0</div>
                <p id="sales-money" class="text-2xl font-bold text-emerald-500 mb-10">$ 0</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="updateSales(1)" class="w-full max-w-xs bg-rose-600 text-white py-6 rounded-[32px] font-black text-2xl shadow-xl shadow-rose-100 active:scale-95 transition">VENDER CAJA</button>
                    <button onclick="secureDelete('sales')" class="w-20 bg-slate-100 text-slate-300 rounded-[32px]"><i class="fas fa-undo"></i></button>
                </div>
            </div>
        </div>

        <div id="module-finance" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400"><i class="fas fa-arrow-left mr-2"></i> VOLVER</button>
            
            <div class="glass-card mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-purple-600 uppercase text-xs">Pago de Nómina</h3>
                    <button onclick="addPayrollRow()" class="text-[10px] font-black bg-purple-100 text-purple-600 px-3 py-1 rounded-full">+ AÑADIR PAGO</button>
                </div>
                <div id="payroll-container" class="space-y-3"></div>
            </div>

            <div class="glass-card">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-rose-600 uppercase text-xs">Gastos Extraordinarios</h3>
                    <button onclick="addExpenseRow()" class="text-[10px] font-black bg-rose-100 text-rose-600 px-3 py-1 rounded-full">+ AÑADIR GASTO</button>
                </div>
                <div id="expenses-container" class="space-y-3"></div>
            </div>
        </div>

        <div id="module-settings" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400 uppercase"><i class="fas fa-arrow-left"></i></button>
            <div class="glass-card">
                <h3 class="font-black mb-4">Configuración</h3>
                <label class="text-[10px] font-black text-slate-400 uppercase">Precio por Caja</label>
                <input type="number" id="config-price" oninput="saveSystem()" class="input-nova text-2xl font-black text-rose-600">
            </div>
        </div>

    </div>

    <script>
        const MASTER_CODE = "26822231";
        let db = {
            stock: 0, sales: 0, price: 48000,
            routes: [], payroll: [], expenses: []
        };

        const formatCOP = (n) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(n);

        function showModule(id) {
            document.querySelectorAll('.module-section').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // --- LÓGICA DE STOCK ---
        function addStock() {
            const val = parseInt(document.getElementById('input-add-stock').value) || 0;
            db.stock += val;
            document.getElementById('input-add-stock').value = "";
            saveSystem();
        }

        function updateSales(n) {
            if(n > 0 && db.stock <= 0) { alert("¡Sin stock!"); return; }
            db.sales += n; db.stock -= n;
            saveSystem();
        }

        // --- FILAS DE NÓMINA ---
        function addPayrollRow(data = { name: '', pay: 0 }) {
            const container = document.getElementById('payroll-container');
            const div = document.createElement('div');
            div.className = "flex items-center space-x-2 animate-slideUp";
            div.innerHTML = `
                <input type="text" placeholder="Trabajador" value="${data.name}" class="input-nova text-xs flex-1">
                <input type="number" placeholder="$ Pago" value="${data.pay}" class="input-nova text-xs w-24 font-bold text-purple-600">
                <button onclick="secureDeleteRow(this, 'payroll')" class="text-slate-200 hover:text-rose-500 p-2"><i class="fas fa-trash-alt"></i></button>
            `;
            container.appendChild(div);
            div.querySelectorAll('input').forEach(i => i.addEventListener('input', saveSystem));
        }

        // --- FILAS DE GASTOS ---
        function addExpenseRow(data = { desc: '', pay: 0 }) {
            const container = document.getElementById('expenses-container');
            const div = document.createElement('div');
            div.className = "flex items-center space-x-2 animate-slideUp";
            div.innerHTML = `
                <input type="text" placeholder="Descripción" value="${data.desc}" class="input-nova text-xs flex-1">
                <input type="number" placeholder="$ Gasto" value="${data.pay}" class="input-nova text-xs w-24 font-bold text-rose-600">
                <button onclick="secureDeleteRow(this, 'expenses')" class="text-slate-200 hover:text-rose-500 p-2"><i class="fas fa-trash-alt"></i></button>
            `;
            container.appendChild(div);
            div.querySelectorAll('input').forEach(i => i.addEventListener('input', saveSystem));
        }

        // --- FILAS DE RUTAS ---
        function addRouteRow(data = { name: '', addr: '', qty: 0, time: '' }) {
            const container = document.getElementById('routes-container');
            const div = document.createElement('div');
            div.className = "glass-card space-y-3 border-l-4 border-amber-400";
            const time = data.time || new Date().toLocaleString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: true });
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <input type="text" placeholder="Tienda" value="${data.name}" class="font-bold text-sm outline-none bg-transparent flex-1">
                    <span class="text-[9px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded-full">${time}</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" placeholder="Dirección" value="${data.addr}" class="input-nova text-[10px] flex-1">
                    <input type="number" placeholder="Cant." value="${data.qty}" class="input-nova text-center font-black w-16 text-blue-600">
                    <button onclick="secureDeleteRow(this, 'routes')" class="text-slate-200 p-2"><i class="fas fa-times"></i></button>
                </div>
            `;
            container.appendChild(div);
            div.querySelectorAll('input').forEach(i => i.addEventListener('input', saveSystem));
        }

        // --- SEGURIDAD ---
        function secureDeleteRow(btn, type) {
            const code = prompt("CÓDIGO DE SEGURIDAD:");
            if(code === MASTER_CODE) {
                btn.closest(type === 'routes' ? '.glass-card' : 'div').remove();
                saveSystem();
            } else {
                alert("Incorrecto");
            }
        }

        function secureDelete(type) {
            const code = prompt("CÓDIGO DE SEGURIDAD:");
            if(code === MASTER_CODE) {
                if(type === 'sales') { db.stock += db.sales; db.sales = 0; }
                saveSystem();
            }
        }

        // --- MOTOR CENTRAL ---
        function saveSystem() {
            db.price = document.getElementById('config-price').value || 48000;
            
            // Nómina
            db.payroll = [];
            let totalPayroll = 0;
            document.querySelectorAll('#payroll-container > div').forEach(el => {
                const ins = el.querySelectorAll('input');
                const val = parseInt(ins[1].value) || 0;
                totalPayroll += val;
                db.payroll.push({ name: ins[0].value, pay: val });
            });

            // Gastos
            db.expenses = [];
            let totalExpenses = 0;
            document.querySelectorAll('#expenses-container > div').forEach(el => {
                const ins = el.querySelectorAll('input');
                const val = parseInt(ins[1].value) || 0;
                totalExpenses += val;
                db.expenses.push({ desc: ins[0].value, pay: val });
            });

            // Rutas
            db.routes = [];
            document.querySelectorAll('#routes-container > .glass-card').forEach(el => {
                const ins = el.querySelectorAll('input');
                db.routes.push({ name: ins[0].value, addr: ins[1].value, qty: ins[2].value, time: el.querySelector('span').innerText });
            });

            // UI
            const totalSales = db.sales * db.price;
            document.getElementById('display-stock').innerText = db.stock;
            document.getElementById('nav-stock').innerText = db.stock;
            document.getElementById('sales-count').innerText = db.sales;
            document.getElementById('sales-money').innerText = formatCOP(totalSales);

            // Balance
            document.getElementById('bal-sales').innerText = formatCOP(totalSales);
            document.getElementById('bal-payroll').innerText = `- ${formatCOP(totalPayroll)}`;
            document.getElementById('bal-expenses').innerText = `- ${formatCOP(totalExpenses)}`;
            document.getElementById('bal-total').innerText = formatCOP(totalSales - totalPayroll - totalExpenses);

            localStorage.setItem('nova_pro_v5', JSON.stringify(db));
        }

        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('nova_pro_v5') || '{}');
            if(saved.price) {
                db = saved;
                document.getElementById('config-price').value = db.price;
                db.payroll.forEach(p => addPayrollRow(p));
                db.expenses.forEach(e => addExpenseRow(e));
                db.routes.forEach(r => addRouteRow(r));
                saveSystem();
            }
        };
    </script>
</body>
</html>
