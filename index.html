<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova - Sistema de Gestión Permanente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-nova { border: 1px solid #e2e8f0; padding: 8px; border-radius: 8px; width: 100%; }
        .btn-save { background: #10b981; color: white; font-weight: bold; padding: 10px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>

<div class="flex min-h-screen">
    <div class="w-64 bg-slate-900 text-white p-6 hidden md:block">
        <h1 class="text-2xl font-black mb-8 text-rose-500">NOVA</h1>
    </div>

    <main class="flex-1 p-6 md:p-12">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-slate-800">Panel Administrativo</h2>
                <p class="text-slate-500">Pesos Colombianos (COP)</p>
            </div>
            <button onclick="saveAll()" id="saveBtn" class="bg-rose-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-rose-700">
                GUARDAR TODO
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- INVENTARIO -->
            <div class="card p-6 col-span-2">
                <h3 class="font-bold mb-4">Inventario</h3>
                <input type="number" id="inv-harina" class="input-nova mb-2" placeholder="Harina (kg)">
                <input type="number" id="inv-aceite" class="input-nova mb-2" placeholder="Aceite (L)">
                <input type="number" id="inv-levadura" class="input-nova" placeholder="Levadura (g)">
            </div>

            <!-- MAQUINARIA -->
            <div class="card p-6">
                <h3 class="font-bold mb-4">Inversión</h3>
                <input type="number" id="inv-maquinaria" class="input-nova mb-3" placeholder="Total maquinaria">
                <div class="bg-slate-900 text-white p-4 rounded">
                    <span id="display-total-inversion">$0</span>
                </div>
            </div>

            <!-- VENTAS -->
            <div class="card p-6">
                <h3 class="font-bold mb-4">Ventas</h3>
                <div id="sales-count" class="text-4xl font-bold">0</div>
                <div id="sales-money" class="text-green-600 font-bold mb-4">$0</div>
                <button onclick="changeSales(1)" class="bg-black text-white px-4 py-2 mr-2">+1</button>
                <button onclick="changeSales(-1)" class="bg-gray-300 px-4 py-2">-1</button>
            </div>

            <!-- GASTOS -->
            <div class="card p-6">
                <h3 class="font-bold mb-4">Gastos</h3>
                <input type="number" id="pago-nomina" class="input-nova mb-2" placeholder="Nómina">
                <textarea id="gastos-extra" class="input-nova" placeholder="Otros gastos"></textarea>
            </div>

            <!-- RUTAS -->
            <div class="card p-6">
                <h3 class="font-bold mb-4">Rutas</h3>
                <input type="text" id="tienda1" class="input-nova mb-2" placeholder="Tienda 1">
                <input type="text" id="tienda2" class="input-nova mb-2" placeholder="Tienda 2">
                <input type="text" id="tienda3" class="input-nova">
            </div>

        </div>
    </main>
</div>

<script>
const PRICE_PER_BOX = 12000;
let sales = 0;

// FORMATO COP
function formatCOP(val) {
    return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 0
    }).format(Number(val) || 0);
}

// ACTUALIZAR VENTAS
function updateSalesDisplay() {
    document.getElementById('sales-count').innerText = sales;
    document.getElementById('sales-money').innerText = formatCOP(sales * PRICE_PER_BOX);
}

// CAMBIAR VENTAS
function changeSales(val) {
    sales += val;
    if (sales < 0) sales = 0;
    updateSalesDisplay();
    saveAll();
}

// CALCULAR INVERSIÓN
function calculateInversion() {
    const val = Number(document.getElementById('inv-maquinaria').value) || 0;
    document.getElementById('display-total-inversion').innerText = formatCOP(val);
}

// GUARDAR TODO
function saveAll() {
    const data = {
        harina: Number(document.getElementById('inv-harina').value) || 0,
        aceite: Number(document.getElementById('inv-aceite').value) || 0,
        levadura: Number(document.getElementById('inv-levadura').value) || 0,
        nomina: Number(document.getElementById('pago-nomina').value) || 0,
        gastos: document.getElementById('gastos-extra').value,
        maquinaria: Number(document.getElementById('inv-maquinaria').value) || 0,
        ventas: sales,
        tienda1: document.getElementById('tienda1').value,
        tienda2: document.getElementById('tienda2').value,
        tienda3: document.getElementById('tienda3').value
    };

    localStorage.setItem('nova_data', JSON.stringify(data));

    const btn = document.getElementById('saveBtn');
    btn.innerText = "GUARDADO ✓";
    btn.classList.replace('bg-rose-600','bg-green-600');

    setTimeout(()=>{
        btn.innerText = "GUARDAR TODO";
        btn.classList.replace('bg-green-600','bg-rose-600');
    },1500);
}

// CARGAR DATOS
window.onload = function() {
    const data = JSON.parse(localStorage.getItem('nova_data') || '{}');

    document.getElementById('inv-harina').value = data.harina || 0;
    document.getElementById('inv-aceite').value = data.aceite || 0;
    document.getElementById('inv-levadura').value = data.levadura || 0;
    document.getElementById('pago-nomina').value = data.nomina || 0;
    document.getElementById('gastos-extra').value = data.gastos || "";
    document.getElementById('inv-maquinaria').value = data.maquinaria || 0;

    document.getElementById('tienda1').value = data.tienda1 || "";
    document.getElementById('tienda2').value = data.tienda2 || "";
    document.getElementById('tienda3').value = data.tienda3 || "";

    sales = Number(data.ventas) || 0;

    updateSalesDisplay();
    calculateInversion();
};

// AUTOGUARDADO + EVENTOS
document.querySelectorAll('input, textarea').forEach(el => {
    el.addEventListener('input', () => {
        calculateInversion();
        saveAll();
    });
});
</script>

</body>
</html>
