<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Pro - ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .module-section { display: none; }
        .module-section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; }
        .input-nova { background: #f1f5f9; border: 1.5px solid #e2e8f0; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; outline: none; }
        .timestamp { font-size: 9px; font-weight: 800; color: #94a3b8; background: #f1f5f9; padding: 2px 8px; border-radius: 99px; }
        .stock-badge { background: #ffe4e6; color: #e11d48; padding: 4px 12px; border-radius: 99px; font-weight: 800; font-size: 12px; border: 1px solid #fda4af; }
        .cloud-status { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 99px; text-transform: uppercase; }
        .detail-pill { font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div onclick="showModule('main-menu')" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-9 h-9 bg-rose-600 rounded-lg flex items-center justify-center shadow-lg"><span class="text-white font-black text-xl">N</span></div>
            <h1 class="text-lg font-black tracking-tighter uppercase leading-none">Novactg</h1>
        </div>
        <div class="flex items-center gap-2">
            <div id="sync-indicator" class="cloud-status bg-slate-100 text-slate-400">Sync...</div>
            <div class="stock-badge"><i class="fas fa-box-open mr-1"></i> <span id="nav-stock">0</span></div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">

        <div id="main-menu" class="module-section active">
            
            <div class="glass-card border-2 border-slate-900 mb-6 overflow-hidden">
                <div class="grid grid-cols-2 gap-4 border-b pb-4 mb-4">
                    <div>
                        <label class="text-[9px] font-black text-rose-600 uppercase">Venta x Caja</label>
                        <input type="number" id="price-v" oninput="saveSystem()" class="text-2xl font-black w-full outline-none" value="48000">
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase">Costo Prod.</label>
                        <input type="number" id="price-c" oninput="saveSystem()" class="text-2xl font-black w-full outline-none text-slate-400" value="20000">
                    </div>
                </div>
                <div class="flex justify-between items-center bg-emerald-50 -m-5 p-5 mt-2">
                    <div><p class="text-[10px] font-black text-emerald-600 uppercase">Ganancia x Caja</p><h3 id="gain-unit" class="text-2xl font-black text-emerald-700">$ 0</h3></div>
                    <span id="gain-percent" class="bg-emerald-200 text-emerald-800 text-[10px] px-2 py-1 rounded-lg font-bold">0%</span>
                </div>
            </div>

            <div class="glass-card bg-slate-900 text-white mb-6 shadow-2xl">
                <div class="space-y-3 mb-6 border-b border-slate-800 pb-6 text-[10px] font-black uppercase">
                    <div class="flex justify-between"><span>Ventas Brutas</span><span id="bal-sales" class="text-emerald-400">$ 0</span></div>
                    <div class="flex justify-between"><span>Costo Producción</span><span id="bal-cost-prod" class="text-rose-400">$ 0</span></div>
                    <div class="flex justify-between"><span>Gastos/Insumos</span><span id="bal-out" class="text-rose-400">$ 0</span></div>
                    <div class="flex justify-between"><span>Pérdidas</span><span id="bal-losses" class="text-rose-400">$ 0</span></div>
                </div>
                <div class="flex justify-between items-center">
                    <div><p class="text-[10px] font-black text-rose-500 uppercase">Utilidad Neta</p><h2 id="bal-total" class="text-3xl font-black">$ 0</h2></div>
                    <div class="text-right">
                        <button onclick="closeDay()" class="bg-rose-600 text-[10px] px-4 py-2 rounded-xl font-black uppercase mb-1">Cerrar Día</button>
                        <p class="text-[10px] text-slate-500 font-black uppercase"><span id="total-boxes-out">0</span> Cajas</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <button onclick="showModule('module-inventory')" class="glass-card flex flex-col items-center py-6 border"><i class="fas fa-box text-blue-500 mb-2"></i><span class="text-[9px] font-black uppercase">Stock</span></button>
                <button onclick="showModule('module-routes')" class="glass-card flex flex-col items-center py-6 border"><i class="fas fa-truck text-amber-500 mb-2"></i><span class="text-[9px] font-black uppercase">Rutas</span></button>
                <button onclick="showModule('module-finance')" class="glass-card flex flex-col items-center py-6 border"><i class="fas fa-wallet text-emerald-500 mb-2"></i><span class="text-[9px] font-black uppercase">Pagos</span></button>
                <button onclick="showModule('module-raw-material')" class="glass-card flex flex-col items-center py-6 border"><i class="fas fa-leaf text-purple-500 mb-2"></i><span class="text-[9px] font-black uppercase">Insumos</span></button>
                <button onclick="showModule('module-losses')" class="glass-card flex flex-col items-center py-6 border"><i class="fas fa-trash-alt text-rose-500 mb-2"></i><span class="text-[9px] font-black uppercase">Pérdida</span></button>
                <button onclick="showModule('module-history')" class="glass-card flex flex-col items-center py-6 border-slate-900 border-2"><i class="fas fa-history text-slate-900 mb-2"></i><span class="text-[9px] font-black uppercase">Historial</span></button>
            </div>
        </div>

        <div id="module-inventory" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400 uppercase">Volver</button>
            <div class="glass-card text-center py-10">
                <div id="display-stock" class="text-8xl font-black text-slate-900 mb-8">0</div>
                <div class="flex flex-col gap-3 max-w-xs mx-auto">
                    <input type="number" id="input-add-stock" class="input-nova text-center text-xl" placeholder="Cajas">
                    <button onclick="addStock()" class="bg-rose-600 text-white py-4 rounded-xl font-black uppercase">Cargar Stock</button>
                </div>
            </div>
        </div>

        <div id="module-routes" class="module-section"><div class="flex justify-between items-center mb-6"><button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase">Volver</button><button onclick="addRouteRow()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black">+ Nueva Entrega</button></div><div id="routes-container" class="space-y-4"></div></div>
        <div id="module-losses" class="module-section"><div class="flex justify-between items-center mb-6"><button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase">Volver</button><button onclick="addLossRow()" class="bg-rose-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">+ Pérdida</button></div><div id="losses-container" class="space-y-4"></div></div>
        <div id="module-raw-material" class="module-section"><div class="flex justify-between items-center mb-6"><button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase">Volver</button><button onclick="addRawRow()" class="bg-purple-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">+ Insumo</button></div><div id="raw-container" class="space-y-4"></div></div>
        <div id="module-finance" class="module-section"><div class="flex justify-between items-center mb-6"><button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase">Volver</button><button onclick="addExpenseRow()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">+ Pago</button></div><div id="expenses-container" class="space-y-4"></div></div>
        <div id="module-history" class="module-section"><button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400 uppercase">Volver</button><div id="history-container" class="space-y-3"></div></div>

    </div>

    <script>
        // CONFIGURACIÓN SUPABASE - CON TU LLAVE LARGA
        const SB_URL = "https://vkhiayprbreeokkxkjmg.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZraGlheXByYnJlZW9reGt4am1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDMwNTAsImV4cCI6MjA5MTI3OTA1MH0.piOLlhSFRUaDOWWg0mdOzs_0uvBcpZCxO2x3qTK5lxM";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const MASTER_CODE = "26822231";
        let db = { initial_stock: 0, price: 48000, cost: 20000, routes: [], expenses: [], raw: [], losses: [], history: [] };

        const formatCOP = (n) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(n);
        const getTimestamp = () => new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: true });

        async function loadCloud() {
            const el = document.getElementById('sync-indicator');
            const { data } = await _supabase.from('sistema_nova').select('datos').eq('id', 1).single();
            if (data?.datos) {
                db = { ...db, ...data.datos };
                renderFromDB();
                el.innerText = "En Línea"; el.className = "cloud-status bg-emerald-100 text-emerald-600";
            }
        }

        async function saveCloud() {
            const el = document.getElementById('sync-indicator');
            el.innerText = "Sinc...";
            await _supabase.from('sistema_nova').update({ datos: db }).eq('id', 1);
            el.innerText = "En Línea"; el.className = "cloud-status bg-emerald-100 text-emerald-600";
        }

        function renderFromDB() {
            document.getElementById('price-v').value = db.price;
            document.getElementById('price-c').value = db.cost;
            document.getElementById('routes-container').innerHTML = '';
            document.getElementById('losses-container').innerHTML = '';
            document.getElementById('raw-container').innerHTML = '';
            document.getElementById('expenses-container').innerHTML = '';
            db.routes.forEach(r => addRouteRow(r, false));
            db.losses.forEach(l => addLossRow(l, false));
            db.raw.forEach(rm => addRawRow(rm, false));
            db.expenses.forEach(e => addExpenseRow(e, false));
            saveSystem(false);
        }

        function showModule(id) {
            document.querySelectorAll('.module-section').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'module-history') renderHistory();
        }

        function addStock() {
            const val = parseInt(document.getElementById('input-add-stock').value);
            if(val > 0) { db.initial_stock += val; document.getElementById('input-add-stock').value = ""; saveSystem(); }
        }

        function addRouteRow(data = null, sync = true) {
            const container = document.getElementById('routes-container');
            const div = document.createElement('div'); div.className = "glass-card space-y-3";
            div.innerHTML = `<div class="flex justify-between items-start"><div class="flex-1"><input type="text" placeholder="Tienda" value="${data?data.name:''}" class="font-black text-sm outline-none w-full bg-transparent"><input type="text" placeholder="Dirección" value="${data?data.addr:''}" class="text-[10px] text-slate-400 font-bold outline-none w-full bg-transparent"></div><span class="timestamp">${data?data.time:getTimestamp()}</span></div><div class="flex gap-2"><input type="number" placeholder="Cajas" value="${data?data.qty:0}" class="input-nova font-black text-rose-600 qty-input flex-1"><button onclick="secureDel(this)" class="text-slate-200 px-2"><i class="fas fa-trash-alt"></i></button></div>`;
            container.appendChild(div);
            div.querySelectorAll('input').forEach(i => i.oninput = () => saveSystem());
            if(sync) saveSystem();
        }

        function addLossRow(data = null, sync = true) {
            const container = document.getElementById('losses-container');
            const div = document.createElement('div'); div.className = "glass-card border-l-4 border-rose-500 space-y-2";
            div.innerHTML = `<div class="flex justify-between"><span class="text-[10px] font-black uppercase text-rose-500">Pérdida</span><span class="timestamp">${data?data.time:getTimestamp()}</span></div><div class="flex gap-2"><input type="text" placeholder="Motivo" value="${data?data.desc:''}" class="input-nova text-xs flex-1"><input type="number" placeholder="$" value="${data?data.pay:''}" class="input-nova text-xs w-24 font-black val-input"></div>`;
            container.appendChild(div);
            div.querySelectorAll('input').forEach(i => i.oninput = () => saveSystem());
            if(sync) saveSystem();
        }

        function addRawRow(data = null, sync = true) {
            const container = document.getElementById('raw-container');
            const div = document.createElement('div'); div.className = "glass-card border-l-4 border-purple-500 space-y-2";
            div.innerHTML = `<div class="flex justify-between"><span class="text-[10px] font-black uppercase text-purple-500">Insumo</span><span class="timestamp">${data?data.time:getTimestamp()}</span></div><div class="flex gap-2"><input type="text" placeholder="Material" value="${data?data.item:''}" class="input-nova text-xs flex-1"><input type="number" placeholder="$" value="${data?data.pay:''}" class="input-nova text-xs w-24 font-black val-input"></div>`;
            container.appendChild(div);
            div.querySelectorAll('input').forEach(i => i.oninput = () => saveSystem());
            if(sync) saveSystem();
        }

        function addExpenseRow(data = null, sync = true) {
            const container = document.getElementById('expenses-container');
            const div = document.createElement('div'); div.className = "glass-card border-l-4 border-emerald-500 space-y-2 mb-3";
            div.innerHTML = `<div class="flex justify-between"><span class="timestamp">${data?data.time:getTimestamp()}</span><button onclick="secureDel(this)" class="text-[9px] text-slate-300">X</button></div><div class="flex gap-2"><input type="text" placeholder="Pago" value="${data?data.desc:''}" class="input-nova text-xs flex-1"><input type="number" placeholder="$" value="${data?data.pay:''}" class="input-nova text-xs w-28 font-black val-input"></div>`;
            container.appendChild(div);
            div.querySelectorAll('input').forEach(i => i.oninput = () => saveSystem());
            if(sync) saveSystem();
        }

        function saveSystem(cloud = true) {
            db.price = parseInt(document.getElementById('price-v').value) || 0;
            db.cost = parseInt(document.getElementById('price-c').value) || 0;
            let tc = 0, tl = 0, tr = 0, te = 0;
            db.routes = []; document.querySelectorAll('#routes-container > .glass-card').forEach(el => { const ins = el.querySelectorAll('input'); const q = parseInt(el.querySelector('.qty-input').value) || 0; tc += q; db.routes.push({ name: ins[0].value, addr: ins[1].value, qty: q, time: el.querySelector('.timestamp').innerText }); });
            db.losses = []; document.querySelectorAll('#losses-container > .glass-card').forEach(el => { const ins = el.querySelectorAll('input'); const v = parseInt(el.querySelector('.val-input').value) || 0; tl += v; db.losses.push({ desc: ins[0].value, pay: v, time: el.querySelector('.timestamp').innerText }); });
            db.raw = []; document.querySelectorAll('#raw-container > .glass-card').forEach(el => { const ins = el.querySelectorAll('input'); const v = parseInt(el.querySelector('.val-input').value) || 0; tr += v; db.raw.push({ item: ins[0].value, pay: v, time: el.querySelector('.timestamp').innerText }); });
            db.expenses = []; document.querySelectorAll('#expenses-container > .glass-card').forEach(el => { const ins = el.querySelectorAll('input'); const v = parseInt(el.querySelector('.val-input').value) || 0; te += v; db.expenses.push({ desc: ins[0].value, pay: v, time: el.querySelector('.timestamp').innerText }); });
            const ventas = tc * db.price; const costProd = tc * db.cost; const utilidad = ventas - costProd - te - tr - tl; const stockActual = db.initial_stock - tc;
            document.getElementById('nav-stock').innerText = stockActual; document.getElementById('display-stock').innerText = stockActual; document.getElementById('total-boxes-out').innerText = tc;
            document.getElementById('bal-sales').innerText = formatCOP(ventas); document.getElementById('bal-cost-prod').innerText = `- ${formatCOP(costProd)}`;
            document.getElementById('bal-out').innerText = `- ${formatCOP(te + tr)}`; document.getElementById('bal-losses').innerText = `- ${formatCOP(tl)}`;
            document.getElementById('bal-total').innerText = formatCOP(utilidad);
            const gu = db.price - db.cost; document.getElementById('gain-unit').innerText = formatCOP(gu);
            document.getElementById('gain-percent').innerText = `${db.price>0?((gu/db.price)*100).toFixed(0):0}%`;
            if(cloud) saveCloud();
        }

        function closeDay() {
            if(confirm("¿Cerrar Día y Guardar Detalle?")) {
                const totalC = parseInt(document.getElementById('total-boxes-out').innerText);
                const gInsumos = db.raw.reduce((a,b) => a + b.pay, 0) + db.expenses.reduce((a,b) => a + b.pay, 0);
                const gPerdidas = db.losses.reduce((a,b) => a + b.pay, 0);
                db.history.unshift({ date: new Date().toLocaleDateString('es-CO'), util: document.getElementById('bal-total').innerText, boxes: totalC, insumos: formatCOP(gInsumos), perdidas: formatCOP(gPerdidas), ventas: document.getElementById('bal-sales').innerText });
                db.initial_stock -= totalC; db.routes = []; db.expenses = []; db.raw = []; db.losses = [];
                saveSystem(); renderFromDB();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = db.history.map(h => `
                <div class="glass-card space-y-3">
                    <div class="flex justify-between items-center border-b pb-2">
                        <div><p class="text-[10px] font-black text-slate-400 uppercase">${h.date}</p><p class="text-sm font-black text-slate-900">${h.boxes} CAJAS</p></div>
                        <div class="text-right"><p class="text-[9px] font-black text-emerald-600 uppercase">Utilidad</p><p class="text-lg font-black text-emerald-700">${h.util}</p></div>
                    </div>
                    <div class="flex flex-wrap gap-2"><span class="detail-pill bg-blue-50 text-blue-600">Ventas: ${h.ventas}</span><span class="detail-pill bg-purple-50 text-purple-600">Gastos: ${h.insumos}</span><span class="detail-pill bg-rose-50 text-rose-600">Pérdidas: ${h.perdidas}</span></div>
                </div>
            `).join('') || '<p class="text-center text-slate-400 font-bold py-10">Sin historial.</p>';
        }

        function secureDel(btn) { if(prompt("CÓDIGO:") === MASTER_CODE) { btn.closest('.glass-card').remove(); saveSystem(); } }
        window.onload = loadCloud;
    </script>
</body>
</html>
