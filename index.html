<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Pro - Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .module-section { display: none; }
        .module-section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; }
        .input-nova { background: #f1f5f9; border: 1.5px solid #e2e8f0; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; outline: none; }
        .timestamp { font-size: 9px; font-weight: 800; color: #94a3b8; background: #f1f5f9; padding: 2px 8px; border-radius: 99px; }
        .stock-badge { background: #ffe4e6; color: #e11d48; padding: 4px 12px; border-radius: 99px; font-weight: 800; font-size: 12px; border: 1px solid #fda4af; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div onclick="showModule('main-menu')" class="flex items-center space-x-3 cursor-pointer">
            <div class="w-9 h-9 bg-rose-600 rounded-lg flex items-center justify-center shadow-lg">
                <span class="text-white font-black text-xl">N</span>
            </div>
            <h1 class="text-lg font-black tracking-tighter uppercase leading-none">Nova Pro</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="stock-badge">
                <i class="fas fa-box-open mr-1"></i> <span id="nav-stock">0</span>
            </div>
            <button onclick="closeDay()" class="bg-slate-900 text-white text-[10px] font-black px-3 py-2 rounded-xl uppercase">Cierre</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">

        <div id="main-menu" class="module-section active">
            
            <div class="glass-card border-2 border-slate-900 mb-6 overflow-hidden">
                <div class="grid grid-cols-2 gap-4 border-b pb-4 mb-4">
                    <div>
                        <label class="text-[9px] font-black text-rose-600 uppercase">Precio de Venta</label>
                        <div class="flex items-center text-2xl font-black text-slate-900">
                            <span class="mr-1">$</span>
                            <input type="number" id="price-v" oninput="saveSystem()" class="w-full outline-none" placeholder="48000">
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase">Costo Producción</label>
                        <div class="flex items-center text-2xl font-black text-slate-400">
                            <span class="mr-1">$</span>
                            <input type="number" id="price-c" oninput="saveSystem()" class="w-full outline-none" placeholder="20000">
                        </div>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-emerald-50 -m-5 p-5 mt-2">
                    <div>
                        <p class="text-[10px] font-black text-emerald-600 uppercase">Ganancia x Caja</p>
                        <h3 id="gain-unit" class="text-2xl font-black text-emerald-700">$ 0</h3>
                    </div>
                    <span id="gain-percent" class="bg-emerald-200 text-emerald-800 text-[10px] px-2 py-1 rounded-lg font-bold">0% MARGEN</span>
                </div>
            </div>

            <div class="glass-card bg-slate-900 text-white mb-6 shadow-2xl">
                <div class="space-y-3 mb-6 border-b border-slate-800 pb-6 text-[10px] font-black uppercase">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400">Ventas Brutas</span>
                        <span id="bal-sales" class="text-emerald-400">$ 0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400">Costo de Producción</span>
                        <span id="bal-cost-total" class="text-rose-400">$ 0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400">Gastos / Nómina</span>
                        <span id="bal-expenses" class="text-rose-400">$ 0</span>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-rose-500 uppercase">Utilidad Neta</p>
                        <h2 id="bal-total" class="text-3xl font-black text-white">$ 0</h2>
                    </div>
                    <div class="text-right">
                        <span id="total-boxes-out" class="text-xl font-black">0</span>
                        <span class="text-[9px] text-slate-500 uppercase font-black block">Cajas</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="showModule('module-inventory')" class="glass-card flex items-center gap-4 py-6 border-blue-50 border">
                    <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center"><i class="fas fa-box"></i></div>
                    <span class="text-[10px] font-black uppercase">Stock</span>
                </button>
                <button onclick="showModule('module-routes')" class="glass-card flex items-center gap-4 py-6 border-amber-50 border">
                    <div class="w-10 h-10 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center"><i class="fas fa-truck"></i></div>
                    <span class="text-[10px] font-black uppercase">Rutas</span>
                </button>
                <button onclick="showModule('module-finance')" class="glass-card flex items-center gap-4 py-6 border-emerald-50 border">
                    <div class="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center"><i class="fas fa-wallet"></i></div>
                    <span class="text-[10px] font-black uppercase">Pagos</span>
                </button>
                <button onclick="showModule('module-losses')" class="glass-card flex items-center gap-4 py-6 border-rose-50 border">
                    <div class="w-10 h-10 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center"><i class="fas fa-trash-alt"></i></div>
                    <span class="text-[10px] font-black uppercase">Pérdida</span>
                </button>
            </div>
        </div>

        <div id="module-routes" class="module-section">
            <div class="flex justify-between items-center mb-6">
                <button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400 uppercase"><i class="fas fa-arrow-left mr-1"></i> Volver</button>
                <button onclick="addRouteRow()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">+ Nueva Ruta</button>
            </div>
            <div id="routes-container" class="space-y-4"></div>
        </div>

        <div id="module-inventory" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400 uppercase"><i class="fas fa-arrow-left mr-1"></i> Volver</button>
            <div class="glass-card text-center py-10">
                <div id="display-stock" class="text-8xl font-black text-slate-900 mb-8">0</div>
                <div class="flex flex-col gap-3 max-w-xs mx-auto">
                    <input type="number" id="input-add-stock" class="input-nova text-center text-xl" placeholder="Cantidad">
                    <button onclick="addStock()" class="bg-rose-600 text-white py-4 rounded-xl font-black uppercase text-xs">Cargar Inventario</button>
                </div>
            </div>
        </div>

        <div id="module-finance" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-6 text-xs font-bold text-slate-400 uppercase block"><i class="fas fa-arrow-left mr-1"></i> Volver</button>
            <div class="glass-card">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-rose-600 text-xs uppercase">Egresos</h3>
                    <button onclick="addExpenseRow()" class="text-[10px] font-black bg-rose-100 text-rose-600 px-3 py-1 rounded-full uppercase">+ Pago</button>
                </div>
                <div id="expenses-container" class="space-y-4"></div>
            </div>
        </div>

    </div>

    <script>
        const MASTER_CODE = "26822231";
        let db = { initial_stock: 0, price: 48000, cost: 20000, routes: [], expenses: [] };

        const formatCOP = (n) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(n);
        const getTimestamp = () => new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: true });

        function showModule(id) {
            document.querySelectorAll('.module-section').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function addStock() {
            const val = parseInt(document.getElementById('input-add-stock').value);
            if(val > 0) { db.initial_stock += val; document.getElementById('input-add-stock').value = ""; saveSystem(); }
        }

        function addRouteRow(data = null) {
            const container = document.getElementById('routes-container');
            const div = document.createElement('div'); div.className = "glass-card space-y-3";
            const time = data ? data.time : getTimestamp();
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <input type="text" placeholder="Nombre Tienda" value="${data?data.name:''}" class="font-black outline-none w-full bg-transparent">
                        <input type="text" placeholder="Dirección" value="${data?data.addr:''}" class="text-[10px] text-slate-400 font-bold outline-none w-full bg-transparent">
                    </div>
                    <span class="timestamp">${time}</span>
                </div>
                <div class="flex gap-2">
                    <input type="number" placeholder="Cajas" value="${data?data.qty:0}" class="input-nova font-black text-rose-600 qty-input flex-1">
                    <button onclick="secureDel(this)" class="text-slate-200 px-2"><i class="fas fa-trash"></i></button>
                </div>`;
            container.appendChild(div);
            div.querySelector('.qty-input').addEventListener('input', saveSystem);
            div.querySelectorAll('input').forEach(i => i.addEventListener('change', saveSystem));
        }

        function addExpenseRow(data = null) {
            const container = document.getElementById('expenses-container');
            const div = document.createElement('div'); div.className = "pb-4 border-b flex flex-col gap-2";
            const time = data ? data.time : getTimestamp();
            div.innerHTML = `
                <div class="flex justify-between items-center"><span class="timestamp">${time}</span><button onclick="secureDel(this)" class="text-[9px] text-slate-300">X</button></div>
                <div class="flex gap-2">
                    <input type="text" placeholder="Concepto" value="${data?data.desc:''}" class="input-nova text-xs flex-1">
                    <input type="number" placeholder="$" value="${data?data.pay:''}" class="input-nova text-xs w-24 font-black val-input">
                </div>`;
            container.appendChild(div);
            div.querySelector('.val-input').addEventListener('input', saveSystem);
            div.querySelectorAll('input').forEach(i => i.addEventListener('change', saveSystem));
        }

        function saveSystem() {
            db.price = parseInt(document.getElementById('price-v').value) || 0;
            db.cost = parseInt(document.getElementById('price-c').value) || 0;

            let totalCajas = 0;
            db.routes = [];
            document.querySelectorAll('#routes-container > .glass-card').forEach(el => {
                const ins = el.querySelectorAll('input');
                const q = parseInt(el.querySelector('.qty-input').value) || 0;
                totalCajas += q;
                db.routes.push({ name: ins[0].value, addr: ins[1].value, qty: q, time: el.querySelector('.timestamp').innerText });
            });

            let totalG = 0;
            db.expenses = [];
            document.querySelectorAll('#expenses-container > div').forEach(el => {
                const ins = el.querySelectorAll('input'); if(ins.length < 2) return;
                const v = parseInt(ins[1].value) || 0; totalG += v;
                db.expenses.push({ desc: ins[0].value, pay: v, time: el.querySelector('.timestamp').innerText });
            });

            const ventasBrutas = totalCajas * db.price;
            const costoProduccionTotal = totalCajas * db.cost;
            const utilidad = ventasBrutas - costoProduccionTotal - totalG;
            const stockActual = db.initial_stock - totalCajas;

            document.getElementById('nav-stock').innerText = stockActual;
            document.getElementById('display-stock').innerText = stockActual;
            document.getElementById('total-boxes-out').innerText = totalCajas;
            document.getElementById('bal-sales').innerText = formatCOP(ventasBrutas);
            document.getElementById('bal-cost-total').innerText = `- ${formatCOP(costoProduccionTotal)}`;
            document.getElementById('bal-expenses').innerText = `- ${formatCOP(totalG)}`;
            document.getElementById('bal-total').innerText = formatCOP(utilidad);
            
            const gUnit = db.price - db.cost;
            document.getElementById('gain-unit').innerText = formatCOP(gUnit);
            document.getElementById('gain-percent').innerText = `${db.price > 0 ? ((gUnit/db.price)*100).toFixed(0) : 0}% MARGEN`;

            localStorage.setItem('nova_pro_fixed', JSON.stringify(db));
        }

        function secureDel(btn) { if(prompt("CÓDIGO:") === MASTER_CODE) { btn.closest('.glass-card, .pb-4').remove(); saveSystem(); } }
        function closeDay() { if(confirm("¿Cerrar día?")) { db.initial_stock -= parseInt(document.getElementById('total-boxes-out').innerText); db.routes = []; db.expenses = []; saveSystem(); location.reload(); } }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('nova_pro_fixed') || '{}');
            if(saved.price) db = saved;
            document.getElementById('price-v').value = db.price;
            document.getElementById('price-c').value = db.cost;
            db.routes.forEach(r => addRouteRow(r));
            db.expenses.forEach(e => addExpenseRow(e));
            saveSystem();
        }
    </script>
</body>
</html>
