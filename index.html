<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Pro - Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .module-section { display: none; }
        .module-section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; }
        .input-nova { background: #f1f5f9; border: 1.5px solid #e2e8f0; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; outline: none; }
        .timestamp { font-size: 9px; font-weight: 800; color: #94a3b8; background: #f1f5f9; padding: 2px 8px; border-radius: 99px; }
        .stock-badge { background: #ffe4e6; color: #e11d48; padding: 4px 12px; border-radius: 99px; font-weight: 800; font-size: 12px; border: 1px solid #fda4af; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div onclick="showModule('main-menu')" class="flex items-center space-x-3 cursor-pointer">
            <div class="w-9 h-9 bg-rose-600 rounded-lg flex items-center justify-center shadow-lg">
                <span class="text-white font-black text-xl">N</span>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter uppercase leading-none">Nova Pro</h1>
                <span class="text-[10px] font-bold text-slate-400">ERP SYSTEM</span>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="flex flex-col items-end">
                <span class="text-[8px] font-black text-slate-400 uppercase mr-1">En Bodega</span>
                <div class="stock-badge">
                    <i class="fas fa-box-open mr-1"></i> <span id="nav-stock-val">0</span>
                </div>
            </div>
            <button onclick="closeDay()" class="bg-slate-900 text-white text-[10px] font-black px-3 py-2 rounded-xl">CIERRE</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">

        <div id="main-menu" class="module-section active">
            
            <div class="glass-card border-2 border-slate-900 mb-6 overflow-hidden">
                <div class="grid grid-cols-2 gap-4 border-b pb-4 mb-4">
                    <div>
                        <label class="text-[9px] font-black text-rose-600 uppercase">Precio de Venta</label>
                        <div class="flex items-center text-2xl font-black text-slate-900">
                            <span class="mr-1">$</span>
                            <input type="number" id="price-v" oninput="saveSystem()" class="w-full outline-none" placeholder="48000">
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase">Costo Producción</label>
                        <div class="flex items-center text-2xl font-black text-slate-400">
                            <span class="mr-1">$</span>
                            <input type="number" id="price-c" oninput="saveSystem()" class="w-full outline-none" placeholder="20000">
                        </div>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-emerald-50 -m-5 p-5 mt-2">
                    <div>
                        <p class="text-[10px] font-black text-emerald-600 uppercase">Ganancia/Caja</p>
                        <h3 id="gain-unit" class="text-2xl font-black text-emerald-700">$ 0</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-emerald-600 uppercase">Margen Real</p>
                        <span id="gain-percent" class="bg-emerald-200 text-emerald-800 text-[10px] px-2 py-1 rounded-lg font-bold">0%</span>
                    </div>
                </div>
            </div>

            <div class="glass-card bg-slate-900 text-white mb-6 shadow-2xl">
                <div class="space-y-3 mb-6 border-b border-slate-800 pb-6 text-sm">
                    <div class="flex justify-between items-center"><span class="text-slate-400 font-bold">(+) Ventas Brutas</span><span id="bal-sales" class="text-emerald-400 font-black">$ 0</span></div>
                    <div class="flex justify-between items-center"><span class="text-slate-400 font-bold">(-) Nómina/Gastos</span><span id="bal-out" class="text-rose-400 font-black">$ 0</span></div>
                </div>
                <div class="flex justify-between items-center">
                    <div><p class="text-[10px] font-black text-rose-500 uppercase">Utilidad Neta Hoy</p><h2 id="bal-total" class="text-3xl font-black text-white">$ 0</h2></div>
                    <div class="text-right"><span id="total-boxes-out" class="text-xl font-black">0</span> <span class="text-[10px] text-slate-500 uppercase font-black block">Cajas Despachadas</span></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="showModule('module-inventory')" class="glass-card flex items-center gap-4 py-6 border-blue-100 border">
                    <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center"><i class="fas fa-box"></i></div>
                    <span class="text-[11px] font-black uppercase">Stock</span>
                </button>
                <button onclick="showModule('module-routes')" class="glass-card flex items-center gap-4 py-6 border-amber-100 border">
                    <div class="w-10 h-10 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center"><i class="fas fa-truck"></i></div>
                    <span class="text-[11px] font-black uppercase">Rutas</span>
                </button>
                <button onclick="showModule('module-finance')" class="glass-card flex items-center gap-4 py-6 border-emerald-100 border">
                    <div class="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center"><i class="fas fa-wallet"></i></div>
                    <span class="text-[11px] font-black uppercase">Pagos</span>
                </button>
                <button onclick="showModule('module-history')" class="glass-card flex items-center gap-4 py-6 border-slate-100 border">
                    <div class="w-10 h-10 bg-slate-50 text-slate-500 rounded-full flex items-center justify-center"><i class="fas fa-history"></i></div>
                    <span class="text-[11px] font-black uppercase">Historial</span>
                </button>
            </div>
        </div>

        <div id="module-inventory" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-4 text-xs font-bold text-slate-400 uppercase"><i class="fas fa-arrow-left mr-2"></i> Volver</button>
            <div class="glass-card text-center py-10">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-2">Cajas Disponibles</h3>
                <div id="display-stock" class="text-8xl font-black text-slate-900 mb-8">0</div>
                <div class="flex flex-col gap-3 max-w-xs mx-auto">
                    <input type="number" id="input-add-stock" class="input-nova text-center text-xl" placeholder="Cant. Cajas">
                    <button onclick="addStock()" class="bg-rose-600 text-white py-4 rounded-xl font-black uppercase text-xs">Cargar al Inventario</button>
                </div>
            </div>
        </div>

        <div id="module-routes" class="module-section">
            <div class="flex justify-between items-center mb-6">
                <button onclick="showModule('main-menu')" class="text-xs font-bold text-slate-400"><i class="fas fa-arrow-left"></i></button>
                <button onclick="addRouteRow()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">+ Nueva Entrega</button>
            </div>
            <div id="routes-container" class="space-y-4"></div>
        </div>

    </div>

    <script>
        const MASTER_CODE = "26822231";
        let db = { initial_stock: 0, price: 48000, cost: 20000, routes: [], payroll: [], expenses: [] };

        const formatCOP = (n) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(n);
        const getTimestamp = () => new Date().toLocaleString('es-CO', { hour:'2-digit', minute:'2-digit', hour12: true });

        function showModule(id) {
            document.querySelectorAll('.module-section').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // CARGAR STOCK
        function addStock() {
            const input = document.getElementById('input-add-stock');
            const val = parseInt(input.value);
            if (!isNaN(val) && val > 0) {
                db.initial_stock += val;
                input.value = "";
                saveSystem();
                alert("Stock cargado exitosamente");
            }
        }

        // AGREGAR RUTA
        function addRouteRow(data = null) {
            const container = document.getElementById('routes-container');
            const div = document.createElement('div'); div.className = "glass-card space-y-3";
            const time = data ? data.time : getTimestamp();
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <input type="text" placeholder="Tienda" value="${data?data.name:''}" class="font-black outline-none w-full">
                    <span class="timestamp">${time}</span>
                </div>
                <div class="flex gap-2">
                    <input type="number" placeholder="Cajas" value="${data?data.qty:0}" class="input-nova font-black text-rose-600 qty-input flex-1">
                    <button onclick="secureDel(this)" class="text-slate-200 px-2"><i class="fas fa-trash"></i></button>
                </div>
            `;
            container.appendChild(div);
            div.querySelector('.qty-input').addEventListener('input', saveSystem);
        }

        // GUARDADO Y CALCULOS
        function saveSystem() {
            db.price = parseInt(document.getElementById('price-v').value) || 0;
            db.cost = parseInt(document.getElementById('price-c').value) || 0;

            let totalCajasVendidas = 0;
            db.routes = [];
            document.querySelectorAll('#routes-container > .glass-card').forEach(el => {
                const q = parseInt(el.querySelector('.qty-input').value) || 0;
                totalCajasVendidas += q;
                db.routes.push({ name: el.querySelector('input').value, qty: q, time: el.querySelector('.timestamp').innerText });
            });

            // UI STOCK (El pedido del usuario)
            const stockFinal = db.initial_stock - totalCajasVendidas;
            document.getElementById('nav-stock-val').innerText = stockFinal; // En el Navbar
            document.getElementById('display-stock').innerText = stockFinal; // En el módulo

            // UI BALANCE
            const ventas = totalCajasVendidas * db.price;
            document.getElementById('bal-sales').innerText = formatCOP(ventas);
            document.getElementById('total-boxes-out').innerText = totalCajasVendidas;
            document.getElementById('bal-total').innerText = formatCOP(ventas); // Simplificado

            // UI MARGEN
            const ganancia = db.price - db.cost;
            document.getElementById('gain-unit').innerText = formatCOP(ganancia);
            document.getElementById('gain-percent').innerText = `${db.price > 0 ? ((ganancia/db.price)*100).toFixed(0) : 0}%`;

            localStorage.setItem('nova_pro_final_stock', JSON.stringify(db));
        }

        function secureDel(btn) { if(prompt("CÓDIGO:")===MASTER_CODE) { btn.closest('.glass-card').remove(); saveSystem(); } }
        function closeDay() { if(prompt("CIERRE:")===MASTER_CODE) { alert("Día cerrado correctamente."); } }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('nova_pro_final_stock') || '{}');
            if(saved.price) db = saved;
            document.getElementById('price-v').value = db.price;
            document.getElementById('price-c').value = db.cost;
            db.routes.forEach(r => addRouteRow(r));
            saveSystem();
        }
    </script>
</body>
</html>
