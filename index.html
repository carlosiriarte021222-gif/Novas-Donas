<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novas Donas - Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; }
        .sidebar { height: 100vh; background: #343a40; color: white; position: fixed; width: 200px; padding-top: 20px; }
        .main { margin-left: 220px; padding: 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-link { color: white; opacity: 0.8; }
        .nav-link:hover { opacity: 1; color: #ffce00; }
    </style>
</head>
<body>
    <div class="sidebar d-none d-md-block text-center">
        <h4>🍩 Novas</h4>
        <hr>
        <nav class="nav flex-column">
            <a class="nav-link" href="#">Ventas</a>
            <a class="nav-link" href="#">Inventario</a>
            <a class="nav-link" href="#">Costos</a>
            <a class="nav-link" href="#">Reportes</a>
        </nav>
    </div>
    <div class="main">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Panel de Control - Novas Donas</h2>
            <button class="btn btn-dark">+ Nuevo Pedido</button>
        </div>
        <div class="row g-3">
            <div class="col-md-4">
                <div class="card p-3 bg-white">
                    <small class="text-muted">Ventas Hoy</small>
                    <h3 class="text-success">$145.00</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 bg-white">
                    <small class="text-muted">Por Cobrar</small>
                    <h3 class="text-danger">$32.50</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 bg-white">
                    <small class="text-muted">Mermas</small>
                    <h3>4 u.</h3>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-8">
                <div class="card p-4">
                    <h5>Pedidos Activos</h5>
                    <table class="table mt-3">
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Estado</th>
                                <th>Pago</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Carlos Iriarte</td>
                                <td><span class="badge bg-warning text-dark">En camino</span></td>
                                <td><span class="badge bg-danger">Debe</span></td>
                                <td>$12.00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <h5>Insumos Críticos</h5>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between">Harina <span class="text-danger">Bajo</span></li>
                        <li class="list-group-item d-flex justify-content-between">Cajas <span>OK</span></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
