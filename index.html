<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONAS NOVA 🍩</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { --primary:#ffce00; --bg:#000; --card:#1a1a1a; }

body { background:var(--bg); color:#fff; }

.sidebar { width:260px; height:100vh; position:fixed; background:#111; padding:20px; }
.nav-link { cursor:pointer; padding:10px; border-radius:10px; }
.nav-link.active, .nav-link:hover { background:var(--primary); color:#000; }

.main { margin-left:260px; padding:30px; }

.card-nova { background:var(--card); padding:20px; border-radius:15px; margin-bottom:15px; }

.btn-nova { background:var(--primary); font-weight:bold; border:none; }

@media(max-width:768px){
.sidebar{position:relative;width:100%;height:auto;}
.main{margin-left:0;}
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🍩 DONAS NOVA</h2>

<div class="nav-link active" onclick="ver('dash',this)">Dashboard</div>
<div class="nav-link" onclick="ver('ventas',this)">Ventas</div>
<div class="nav-link" onclick="ver('gastos',this)">Gastos</div>

<hr>
<div onclick="cambiarUser()">👤 <span id="user-tag">Admin</span></div>
</div>

<div class="main">

<!-- DASH -->
<div id="dash" class="section active">

<h3>Resumen Diario</h3>

<input type="date" id="filtroFecha" onchange="render()">

<div class="row mt-3">
<div class="col-md-4"><div class="card-nova"><h5>Ventas Día</h5><h3 id="vDia">$0</h3></div></div>
<div class="col-md-4"><div class="card-nova"><h5>Gastos Día</h5><h3 id="gDia">$0</h3></div></div>
<div class="col-md-4"><div class="card-nova"><h5>Ganancia Día</h5><h3 id="uDia">$0</h3></div></div>
</div>

<canvas id="chart"></canvas>

</div>

<!-- VENTAS -->
<div id="ventas" class="section">
<h3>Ventas</h3>
<button onclick="pop('venta')" class="btn btn-nova mb-2">Nueva Venta</button>

<table class="table table-dark">
<thead><tr><th>Cliente</th><th>Ruta</th><th>Monto</th><th>Estado</th><th>Fecha</th></tr></thead>
<tbody id="tab-ventas"></tbody>
</table>
</div>

<!-- GASTOS -->
<div id="gastos" class="section">
<h3>Gastos</h3>
<button onclick="pop('gasto')" class="btn btn-nova mb-2">Nuevo</button>

<table class="table table-dark">
<thead><tr><th>Concepto</th><th>Monto</th><th>Fecha</th></tr></thead>
<tbody id="tab-gastos"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalNova">
<div class="modal-dialog">
<div class="modal-content bg-dark p-3">

<div id="m-body"></div>
<button onclick="guardar()" class="btn btn-nova mt-2" data-bs-dismiss="modal">Guardar</button>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let db = JSON.parse(localStorage.getItem('NOVA_DB')) || {user:"Admin",ventas:[],gastos:[]};
let tipo="";
let modal=new bootstrap.Modal(document.getElementById('modalNova'));
let chart=null;

function ver(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
render();
}

function cambiarUser(){
let n=prompt("Nombre");
if(n) db.user=n;
save();
}

function pop(t){
tipo=t;
let b=document.getElementById('m-body');

if(t==="venta"){
b.innerHTML=`
<input id="f1" class="form-control mb-2" placeholder="Cliente">
<input id="f2" class="form-control mb-2" placeholder="Ruta">
<input id="f3" type="number" class="form-control mb-2" placeholder="Monto">
<select id="f4" class="form-control mb-2"><option>Pagado</option><option>Pendiente</option></select>
<input id="f5" type="date" class="form-control">
`;
}

if(t==="gasto"){
b.innerHTML=`
<input id="f1" class="form-control mb-2" placeholder="Concepto">
<input id="f2" type="number" class="form-control mb-2" placeholder="Monto">
<input id="f3" type="date" class="form-control">
`;
}

modal.show();
}

function guardar(){

if(tipo==="venta"){
let cliente=f1.value;
let ruta=f2.value;
let monto=parseFloat(f3.value);
let estado=f4.value;
let fecha=f5.value;

if(!cliente||!ruta||isNaN(monto)) return alert("Datos inválidos");

db.ventas.push({cliente,ruta,monto,estado,fecha});
}

if(tipo==="gasto"){
let concepto=f1.value;
let monto=parseFloat(f2.value);
let fecha=f3.value;

if(!concepto||isNaN(monto)) return alert("Datos inválidos");

db.gastos.push({concepto,monto,fecha});
}

save();
}

function save(){
localStorage.setItem('NOVA_DB',JSON.stringify(db));
render();
}

function format(n){
return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(n);
}

function render(){

document.getElementById('user-tag').innerText=db.user;

let fechaFiltro=document.getElementById('filtroFecha').value;

let vDia=0,gDia=0;

let tv=document.getElementById('tab-ventas'); tv.innerHTML="";
db.ventas.forEach(v=>{

if(!fechaFiltro || v.fecha===fechaFiltro){
vDia+=v.monto;
}

tv.innerHTML+=`<tr>
<td>${v.cliente}</td>
<td>${v.ruta}</td>
<td>${format(v.monto)}</td>
<td><span class="badge ${v.estado==='Pagado'?'bg-success':'bg-warning'}">${v.estado}</span></td>
<td>${v.fecha}</td>
</tr>`;
});

let tg=document.getElementById('tab-gastos'); tg.innerHTML="";
db.gastos.forEach(g=>{

if(!fechaFiltro || g.fecha===fechaFiltro){
gDia+=g.monto;
}

tg.innerHTML+=`<tr>
<td>${g.concepto}</td>
<td>${format(g.monto)}</td>
<td>${g.fecha}</td>
</tr>`;
});

document.getElementById('vDia').innerText=format(vDia);
document.getElementById('gDia').innerText=format(gDia);
document.getElementById('uDia').innerText=format(vDia-gDia);

// grafica
let ctx=document.getElementById('chart');
if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'bar',
data:{
labels:["Ventas","Gastos","Ganancia"],
datasets:[{data:[vDia,gDia,vDia-gDia]}]
}
});
}

render();

</script>

</body>
</html>
