<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Pro - Enterprise Unlocked</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .module-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .module-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-nova { border: 1.5px solid #e2e8f0; padding: 12px; border-radius: 12px; width: 100%; transition: all 0.2s; font-weight: 600; }
        .input-nova:focus { border-color: #e11d48; outline: none; ring: 3px ring-rose-50; }
        .card-pro { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div onclick="showModule('main-menu')" class="flex items-center space-x-3 cursor-pointer">
            <div class="w-10 h-10 bg-rose-600 rounded-xl flex items-center justify-center shadow-lg shadow-rose-200">
                <span class="text-white font-black text-xl">N</span>
            </div>
            <div>
                <h1 class="text-lg font-black leading-none">NOVA</h1>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Production System</span>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div id="sync-tag" class="hidden text-[10px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full italic">Sincronizado</div>
            <button onclick="showModule('module-settings')" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 hover:bg-rose-50 hover:text-rose-600 transition">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">

        <div id="main-menu" class="module-section active">
            <h2 class="text-3xl font-black mb-8 tracking-tight">Centro de Mando</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="showModule('module-inventory')" class="card-pro flex items-center space-x-4 hover:border-rose-200 transition text-left">
                    <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-boxes"></i></div>
                    <div><h3 class="font-extrabold">Inventario Ilimitado</h3><p class="text-xs text-slate-400 font-medium">Gestiona todos tus insumos</p></div>
                </button>
                <button onclick="showModule('module-sales')" class="card-pro flex items-center space-x-4 hover:border-emerald-200 transition text-left">
                    <div class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-cash-register"></i></div>
                    <div><h3 class="font-extrabold">Ventas & Caja</h3><p class="text-xs text-slate-400 font-medium">Control de salida de producto</p></div>
                </button>
                <button onclick="showModule('module-routes')" class="card-pro flex items-center space-x-4 hover:border-amber-200 transition text-left">
                    <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-truck"></i></div>
                    <div><h3 class="font-extrabold">Logística Pro</h3><p class="text-xs text-slate-400 font-medium">Rutas de entrega dinámicas</p></div>
                </button>
                <button onclick="showModule('module-finance')" class="card-pro flex items-center space-x-4 hover:border-rose-200 transition text-left">
                    <div class="w-14 h-14 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-chart-pie"></i></div>
                    <div><h3 class="font-extrabold">Finanzas</h3><p class="text-xs text-slate-400 font-medium">Nómina y Maquinaria</p></div>
                </button>
            </div>
        </div>

        <div id="module-settings" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-6 font-bold text-slate-400 text-sm"><i class="fas fa-chevron-left mr-2"></i> Volver al menú</button>
            <div class="card-pro">
                <h3 class="text-xl font-black mb-6 border-b pb-4 text-slate-800">Ajustes de Precios (COP)</h3>
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase mb-2">Precio de venta por caja</label>
                        <input type="number" id="setting-box-price" oninput="saveSystem()" class="input-nova text-2xl text-emerald-600" placeholder="Ej: 45000">
                    </div>
                    <p class="text-[10px] text-slate-400 italic font-medium leading-relaxed">Este valor se usará para calcular automáticamente los ingresos en el módulo de ventas.</p>
                </div>
            </div>
        </div>

        <div id="module-inventory" class="module-section">
            <div class="flex justify-between items-center mb-6">
                <button onclick="showModule('main-menu')" class="font-bold text-slate-400 text-sm"><i class="fas fa-chevron-left mr-2"></i> Volver</button>
                <button onclick="addRow('inventory-list')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-700 transition">
                    <i class="fas fa-plus mr-1"></i> AGREGAR INSUMO
                </button>
            </div>
            <div class="card-pro">
                <h3 class="text-xl font-black mb-6">Control de Materia Prima</h3>
                <div id="inventory-list" class="space-y-3">
                    </div>
            </div>
        </div>

        <div id="module-sales" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-6 font-bold text-slate-400 text-sm"><i class="fas fa-chevron-left mr-2"></i> Volver</button>
            <div class="card-pro text-center">
                <h3 class="text-xl font-black mb-8 text-emerald-600 uppercase tracking-widest">Balance de Salida</h3>
                <div class="bg-slate-900 rounded-[32px] p-10 mb-8 shadow-2xl">
                    <div id="display-sales-count" class="text-7xl font-black text-white mb-2">0</div>
                    <p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest mb-6">Cajas Entregadas</p>
                    <div id="display-sales-money" class="text-2xl font-bold text-emerald-400 tracking-tight">$ 0</div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="updateSales(1)" class="bg-emerald-500 text-white p-6 rounded-2xl font-black text-2xl hover:bg-emerald-600 active:scale-95 transition">+ 1 CAJA</button>
                    <button onclick="updateSales(-1)" class="bg-slate-100 text-slate-400 p-6 rounded-2xl font-bold hover:bg-red-50 hover:text-red-500 transition">CORREGIR</button>
                </div>
            </div>
        </div>

        <div id="module-routes" class="module-section">
            <div class="flex justify-between items-center mb-6">
                <button onclick="showModule('main-menu')" class="font-bold text-slate-400 text-sm"><i class="fas fa-chevron-left mr-2"></i> Volver</button>
                <button onclick="addRow('route-list')" class="bg-amber-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-amber-600 transition">
                    <i class="fas fa-plus mr-1"></i> NUEVA TIENDA
                </button>
            </div>
            <div class="card-pro">
                <h3 class="text-xl font-black mb-6">Guía de Reparto Nova</h3>
                <div id="route-list" class="space-y-3">
                    </div>
            </div>
        </div>

        <div id="module-finance" class="module-section">
            <button onclick="showModule('main-menu')" class="mb-6 font-bold text-slate-400 text-sm"><i class="fas fa-chevron-left mr-2"></i> Volver</button>
            <div class="card-pro space-y-6">
                <h3 class="text-xl font-black text-rose-600 border-b pb-4 italic underline decoration-rose-200">Estados Financieros</h3>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Activos: Inversión Maquinaria</label>
                    <input type="number" id="fin-machinery" oninput="saveSystem()" class="input-nova bg-slate-50 border-none text-xl" placeholder="$ 0">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Pasivos: Pago de Nómina</label>
                    <input type="number" id="fin-payroll" oninput="saveSystem()" class="input-nova bg-slate-50 border-none" placeholder="$ 0">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Gastos Operativos Extra</label>
                    <textarea id="fin-extra" oninput="saveSystem()" class="input-nova bg-slate-50 border-none h-24" placeholder="Detalle de gastos..."></textarea>
                </div>
            </div>
        </div>

    </div>

    <script>
        let salesCount = 0;
        let boxPrice = 0;

        // NAVEGACIÓN
        function showModule(id) {
            document.querySelectorAll('.module-section').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // AGREGAR FILAS DINÁMICAMENTE
        function addRow(containerId, data = null) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = "flex items-center space-x-3 bg-slate-50 p-3 rounded-2xl animate-fade-in";
            
            if(containerId === 'inventory-list') {
                div.innerHTML = `
                    <input type="text" placeholder="Insumo" class="flex-1 bg-transparent font-bold text-sm outline-none" value="${data ? data.name : ''}">
                    <input type="number" placeholder="Cant." class="w-16 bg-white border rounded-lg p-1 text-center font-bold text-xs" value="${data ? data.val : ''}">
                    <input type="text" placeholder="Unidad" class="w-12 bg-transparent text-[10px] font-bold text-slate-400 outline-none uppercase" value="${data ? data.unit : ''}">
                    <button onclick="this.parentElement.remove(); saveSystem();" class="text-slate-300 hover:text-red-500"><i class="fas fa-times-circle"></i></button>
                `;
            } else if(containerId === 'route-list') {
                div.innerHTML = `
                    <input type="checkbox" ${data && data.check ? 'checked' : ''} onchange="saveSystem()" class="w-6 h-6 accent-amber-500">
                    <input type="text" placeholder="Nombre de Tienda" class="flex-1 bg-transparent font-bold text-sm outline-none" value="${data ? data.name : ''}">
                    <button onclick="this.parentElement.remove(); saveSystem();" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                `;
            }

            container.appendChild(div);
            // Escuchar cambios en los inputs nuevos
            div.querySelectorAll('input').forEach(i => i.addEventListener('input', saveSystem));
        }

        // LÓGICA DE VENTAS
        function updateSales(val) {
            salesCount += val;
            if(salesCount < 0) salesCount = 0;
            renderSales();
            saveSystem();
        }

        function renderSales() {
            document.getElementById('display-sales-count').innerText = salesCount;
            const total = salesCount * boxPrice;
            document.getElementById('display-sales-money').innerText = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(total);
        }

        // GUARDADO TOTAL DEL SISTEMA
        function saveSystem() {
            boxPrice = document.getElementById('setting-box-price').value || 0;
            
            // Recolectar Inventario
            const invItems = [];
            document.querySelectorAll('#inventory-list > div').forEach(row => {
                const inputs = row.querySelectorAll('input');
                invItems.push({ name: inputs[0].value, val: inputs[1].value, unit: inputs[2].value });
            });

            // Recolectar Rutas
            const routeItems = [];
            document.querySelectorAll('#route-list > div').forEach(row => {
                const check = row.querySelector('input[type="checkbox"]').checked;
                const name = row.querySelector('input[type="text"]').value;
                routeItems.push({ check, name });
            });

            const systemData = {
                price: boxPrice,
                sales: salesCount,
                inventory: invItems,
                routes: routeItems,
                finance: {
                    maq: document.getElementById('fin-machinery').value,
                    pay: document.getElementById('fin-payroll').value,
                    ext: document.getElementById('fin-extra').value
                }
            };

            localStorage.setItem('nova_unlocked_db', JSON.stringify(systemData));
            renderSales();

            // Etiqueta visual de guardado
            const tag = document.getElementById('sync-tag');
            tag.classList.remove('hidden');
            setTimeout(() => tag.classList.add('hidden'), 800);
        }

        // CARGA AL INICIAR
        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('nova_unlocked_db') || '{}');
            
            if(saved.price) {
                document.getElementById('setting-box-price').value = saved.price;
                boxPrice = saved.price;
            }
            
            salesCount = saved.sales || 0;
            renderSales();

            if(saved.inventory) saved.inventory.forEach(item => addRow('inventory-list', item));
            if(saved.routes) saved.routes.forEach(item => addRow('route-list', item));

            if(saved.finance) {
                document.getElementById('fin-machinery').value = saved.finance.maq || "";
                document.getElementById('fin-payroll').value = saved.finance.pay || "";
                document.getElementById('fin-extra').value = saved.finance.ext || "";
            }
        };
    </script>
</body>
</html>
