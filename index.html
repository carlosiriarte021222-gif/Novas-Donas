<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novas Donas - Sistema Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .sidebar { height: 100vh; background: #212529; color: white; position: fixed; width: 200px; padding: 20px; }
        .main { margin-left: 220px; padding: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); transition: 0.3s; }
        .nav-link { color: #adb5bd; margin-bottom: 10px; }
        .nav-link:hover { color: #ffce00; }
        .btn-warning { background-color: #ffce00; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 class="text-center">🍩 Novas</h4>
        <hr>
        <nav class="nav flex-column">
            <a class="nav-link" href="#">📊 Dashboard</a>
            <a class="nav-link" href="#">📦 Inventario</a>
            <a class="nav-link" href="#">💵 Cobranzas</a>
        </nav>
    </div>

    <div class="main">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Panel de Control</h2>
            <button class="btn btn-warning" onclick="abrirModal()">+ Nuevo Pedido</button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <small class="text-muted">Ventas Hoy</small>
                    <h3 class="text-success" id="statVentas">$0.00</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <small class="text-muted">Por Cobrar</small>
                    <h3 class="text-danger" id="statDeuda">$0.00</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <small class="text-muted">Total Pedidos</small>
                    <h3 id="statTotal">0</h3>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h5>Pedidos Recientes</h5>
            <table class="table mt-3">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Estado</th>
                        <th>Pago</th>
                        <th>Total</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="listaVentas"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalPedido" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrar Venta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Cliente</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Total ($)</label>
                        <input type="number" id="monto" class="form-control" placeholder="0.00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado de Pago</label>
                        <select id="pago" class="form-select">
                            <option value="Pagado">Pagado</option>
                            <option value="Debe">Debe</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning" onclick="guardarPedido()">Guardar Venta</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let ventas = JSON.parse(localStorage.getItem('ventas_donas')) || [];
        const modal = new bootstrap.Modal(document.getElementById('modalPedido'));

        function abrirModal() { modal.show(); }

        function guardarPedido() {
            const nombre = document.getElementById('nombre').value;
            const monto = parseFloat(document.getElementById('monto').value);
            const pago = document.getElementById('pago').value;

            if(!nombre || !monto) return alert("Por favor llena los campos");

            const nuevoPedido = { nombre, monto, pago, id: Date.now() };
            ventas.push(nuevoPedido);
            localStorage.setItem('ventas_donas', JSON.stringify(ventas));
            
            document.getElementById('nombre').value = "";
            document.getElementById('monto').value = "";
            modal.hide();
            renderizar();
        }

        function borrar(id) {
            ventas = ventas.filter(v => v.id !== id);
            localStorage.setItem('ventas_donas', JSON.stringify(ventas));
            renderizar();
        }

        function renderizar() {
            const lista = document.getElementById('listaVentas');
            lista.innerHTML = "";
            let totalV = 0;
            let totalD = 0;

            ventas.forEach(v => {
                totalV += v.monto;
                if(v.pago === "Debe") totalD += v.monto;

                lista.innerHTML += `
                    <tr>
                        <td>${v.nombre}</td>
                        <td><span class="badge bg-info">En preparación</span></td>
                        <td><span class="badge ${v.pago === 'Pagado' ? 'bg-success' : 'bg-danger'}">${v.pago}</span></td>
                        <td>$${v.monto.toFixed(2)}</td>
                        <td><button class="btn btn-sm btn-outline-danger" onclick="borrar(${v.id})">x</button></td>
                    </tr>
                `;
            });

            document.getElementById('statVentas').innerText = `$${totalV.toFixed(2)}`;
            document.getElementById('statDeuda').innerText = `$${totalD.toFixed(2)}`;
            document.getElementById('statTotal').innerText = ventas.length;
        }

        renderizar(); // Carga inicial
    </script>
</body>
</html>
